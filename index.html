let TL_HILITE=null; // highlighted week index, or null — click a week header to toggle
function tlToggleWeek(w){ TL_HILITE=(TL_HILITE===w)?null:w; go(SCREEN); }
let TL_EXPANDED={}; // project id -> inline activities-timeline dropdown open?
function tlToggleProjRow(pid){ TL_EXPANDED[pid]=!TL_EXPANDED[pid]; go(SCREEN); }
/* Gantt-style, not a plain list — each activity gets its own bar positioned
   on the SAME week scale (min/dayPct) as the parent project row above it, so
   the bars line up under the shared week header instead of needing one of
   their own. Tasks only carry a due date (no individual start), so each
   bar's start is chained from the previous activity's due date (or the
   project's own start for the first one) — a simple, readable approximation
   of sequencing rather than true independent start dates. */
function tlProjActivitiesHTML(p,min,dayPct){
  const tasks=(p.tasks||[]).slice().sort((a,b)=>String(a.fim||'9999').localeCompare(String(b.fim||'9999')));
  if(!tasks.length) return '<div style="font-size:12px;color:var(--txt-3);padding:8px 16px 8px 45px">No activities.</div>';
  let prevEnd=p.inicio||p.prazo;
  return tasks.map(t=>{
    const st=statusOf(t.status), hp=healthPill(t.status);
    const endStr=t.fim||prevEnd;
    const s=new Date(prevEnd+'T00:00:00'), e=new Date(endStr+'T00:00:00');
    prevEnd=endStr;
    const left=Math.max(0,((s-min)/864e5)*dayPct), width=Math.max(dayPct*1.3,(((e-s)/864e5)+1)*dayPct);
    return `<div style="display:flex;align-items:center;border-bottom:1px dashed var(--line-2)">
      <div style="width:230px;flex-shrink:0;padding:7px 16px 7px 45px;border-right:1px solid var(--line);min-width:0;display:flex;align-items:center;gap:7px">
        <span class="badge ${st.cls}" style="flex-shrink:0;font-size:9px;padding:1px 6px"><span class="d"></span>${st.name}</span>
        <span style="flex:1;min-width:0;font-size:11.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.n)}</span>
      </div>
      <div style="flex:1;position:relative;height:32px">
        <div title="${esc(t.n)} · ${t.fim?fmtDate(t.fim):'no due date'} · ${t.pct||0}%" style="position:absolute;left:${left}%;width:${width}%;top:6px;height:18px;border-radius:5px;background:${hp.dot};display:flex;align-items:center;padding:0 7px;overflow:hidden">
          <span style="font-size:9px;font-weight:700;color:#fff;white-space:nowrap">${t.pct||0}%</span>
        </div>
      </div>
    </div>`;
  }).join('');
}
function renderTimeline(){
  const list=visProjs().filter(p=>p.prazo).slice();
  if(!list.length)return '<div class="empty">No projects with a due date.</div>';
  // range de semanas
  const dates=[]; list.forEach(p=>{if(p.inicio)dates.push(new Date(p.inicio+'T00:00:00'));if(p.prazo)dates.push(new Date(p.prazo+'T00:00:00'));});
  let min=new Date(Math.min(...dates)), max=new Date(Math.max(...dates));
  min.setDate(min.getDate()-min.getDay()); // início da semana
  const totalDays=Math.max(7,Math.round((max-min)/864e5)+7);
  const weeks=Math.ceil(totalDays/7); const dayPct=100/(weeks*7);
  const tdy=today0();
  const MM=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const ranges=list.map(p=>({p,s:new Date((p.inicio||p.prazo)+'T00:00:00'),e:new Date(p.prazo+'T00:00:00')}));
  // highlight stripe for the selected week — same left/width math as a header cell, drawn behind the bars/header text
  const hiliteStripe=TL_HILITE!=null?`<div style="position:absolute;top:0;bottom:0;left:${TL_HILITE/weeks*100}%;width:${100/weeks}%;background:rgba(214,138,4,.12);pointer-events:none"></div>`:'';
  let wkHead=''; const wkTotals=[];
  for(let w=0;w<weeks;w++){
    const dd=new Date(min); dd.setDate(dd.getDate()+w*7);
    const dEnd=new Date(dd.getFullYear(),dd.getMonth(),dd.getDate()+7);
    const now=tdy>=dd&&tdy<dEnd;
    const sel=TL_HILITE===w;
    const cnt=ranges.filter(r=>r.s<dEnd&&r.e>=dd).length;
    wkTotals.push(cnt);
    wkHead+=`<div onclick="tlToggleWeek(${w})" title="${cnt} project(s) active this week — click to highlight the column" style="flex:1;min-width:0;padding:9px 2px;text-align:center;font-size:10px;font-weight:600;color:${now?'#fff':sel?'#7a5200':'#8a90a0'};background:${now?'#10131a':sel?'#fbf0d8':'transparent'};border-right:1px solid #edeff4;cursor:pointer">${dd.getDate()}/${MM[dd.getMonth()]}</div>`;
  }
  const wkTotalsRow=weeks?`<div style="display:flex;position:relative">${hiliteStripe}${wkTotals.map((c,w)=>`<div style="flex:1;min-width:0;padding:6px 2px;text-align:center;font-family:var(--mono);font-size:10px;font-weight:700;color:${TL_HILITE===w?'#9c6404':'var(--txt-3)'};border-right:1px solid #edeff4">${c||'—'}</div>`).join('')}</div>`:'';
  const rows=list.sort((a,b)=>new Date((a.inicio||a.prazo)+'T00:00:00')-new Date((b.inicio||b.prazo)+'T00:00:00')).map(p=>{
    const stg=stageOf(p.etapa); const pr=computeProg(p);
    const s=new Date((p.inicio||p.prazo)+'T00:00:00'), e=new Date(p.prazo+'T00:00:00');
    const left=Math.max(0,((s-min)/864e5)*dayPct), width=Math.max(dayPct*2,(((e-s)/864e5)+1)*dayPct);
    const open=!!TL_EXPANDED[p.id];
    return `<div>
    <div onclick="tlToggleProjRow('${esc(p.id)}')" style="display:flex;border-bottom:1px solid #edeff4;align-items:center;cursor:pointer;background:${open?'var(--paper-2)':''}">
      <div style="width:230px;flex-shrink:0;padding:11px 16px;border-right:1px solid var(--line);min-width:0;display:flex;align-items:center;gap:7px">
        <span style="color:var(--txt-3);display:flex;flex-shrink:0;transform:rotate(${open?'0deg':'-90deg'});transition:transform .15s">${icn('chev',11)}</span>
        <span style="min-width:0"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.nome)}</div><div style="font-size:11px;color:var(--txt-3);margin-top:1px">${esc(respName(p.resp)||'—')} · ${esc(stg.name)}</div></span>

      </div>
      <div style="flex:1;position:relative;height:46px">${hiliteStripe}<div style="position:absolute;left:${left}%;width:${width}%;top:11px;height:24px;border-radius:7px;background:${stg.color};box-shadow:0 3px 8px -3px rgba(0,0,0,.3);display:flex;align-items:center;padding:0 9px;overflow:hidden"><span style="font-size:10.5px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.25);white-space:nowrap">${pr}%</span></div></div>

    ${rows}
    <div style="display:flex;border-top:1px solid var(--line);background:#fafbfd"><div style="width:230px;flex-shrink:0;padding:6px 16px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--txt-3);border-right:1px solid var(--line);display:flex;align-items:center">Active/week</div><div style="flex:1">${wkTotalsRow}</div></div>

    <span><span style="display:inline-block;width:9px;height:9px;border-radius:3px;background:#16a06a;margin-right:5px;vertical-align:-1px"></span>Delivery</span>
    ${TL_HILITE!=null?`<span style="margin-left:auto;color:#9c6404">Column highlighted — <a onclick="tlToggleWeek(${TL_HILITE})" style="cursor:pointer;text-decoration:underline">clear</a></span>`:''}

const ACC_ORDER=['32202171','32202169'];

function accBreakdownData(){
  const fee=DATA.fee||[];
  let camps=(DATA.poProjetos||[]).filter(p=>p.aprovacao_status==='APROVADO');
  if(effPapel()==='agencia'&&effAgencia()) camps=camps.filter(p=>p.agencia===effAgencia());
  const map={};
  const bucket=(acc,cc,desc)=>{
    const a=map[acc]=map[acc]||{acc,ccs:{}};
    const c=a.ccs[cc]=a.ccs[cc]||{cc,rows:{}};
    return c.rows[desc]=c.rows[desc]||{desc,b:0,cons:0,comp:0,pend:0};
  };
  camps.forEach(p=>{
    const poM={};
    (DATA.pos||[]).forEach(po=>{
      if(po.projeto_id!==p.id||!boInPeriod(po.competencia))return;
      const m=String(po.competencia).slice(0,7), v=+po.valor||0;
      poM[m]=poM[m]||{cons:0,comp:0,pend:0};
      if(CONS.includes(po.status))poM[m].cons+=v; else if(COMP.includes(po.status))poM[m].comp+=v; else if(PEND.includes(po.status))poM[m].pend+=v;
    });
    if(p.rateio){
      const monthCat={};
      (DATA.rateio||[]).forEach(r=>{ if(r.projeto_id!==p.id||!boInPeriod(r.competencia))return; const m=String(r.competencia).slice(0,7); monthCat[m]=monthCat[m]||{}; monthCat[m][r.categoria]=(monthCat[m][r.categoria]||0)+(+r.valor||0); });
      Object.keys(monthCat).forEach(m=>{
        const cats=monthCat[m], tot=Object.values(cats).reduce((s,v)=>s+v,0)||1, po=poM[m]||{cons:0,comp:0,pend:0};
        Object.keys(cats).forEach(cat=>{
          const f=fee.find(x=>x.tipo===p.rateio_tipo&&x.categoria===cat)||{};
          const r=bucket(f.account||'—',f.cc||'—',f.descricao||cat||'—');
          const sh=cats[cat]/tot;
          r.b+=cats[cat]; r.cons+=po.cons*sh; r.comp+=po.comp*sh; r.pend+=po.pend*sh;
        });
      });
    }else{
      const r=bucket(p.account||'—',p.cc||'—',p.account_desc||p.nome||'—');
      (DATA.tetos||[]).forEach(t=>{ if(t.projeto_id!==p.id||!boInPeriod(t.competencia))return; r.b+=(+t.teto||0); });
      Object.values(poM).forEach(v=>{ r.cons+=v.cons; r.comp+=v.comp; r.pend+=v.pend; });
    }
  });
  return map;
}

/* Export (read-only) — mirrors renderBudgets' own aggregation exactly, transcribes
   what that screen already displays per campaign, never recomputes new business values. */
function budgetExportRows(){
  const canSensitive=effIsManager()||['admin','financeiro'].includes(effPapel());
  const fee=DATA.fee||[];
  let camps=(DATA.poProjetos||[]).filter(p=>p.aprovacao_status==='APROVADO');
  if(effPapel()==='agencia'&&effAgencia()) camps=camps.filter(p=>p.agencia===effAgencia());
  const tetoBy={},consBy={},compBy={},pendBy={};
  DATA.tetos.forEach(t=>{tetoBy[t.projeto_id]=(tetoBy[t.projeto_id]||0)+(+t.teto||0);});
  DATA.rateio.forEach(r=>{tetoBy[r.projeto_id]=(tetoBy[r.projeto_id]||0)+(+r.valor||0);});
  DATA.pos.forEach(po=>{const v=+po.valor||0;if(CONS.includes(po.status))consBy[po.projeto_id]=(consBy[po.projeto_id]||0)+v;else if(COMP.includes(po.status))compBy[po.projeto_id]=(compBy[po.projeto_id]||0)+v;else if(PEND.includes(po.status))pendBy[po.projeto_id]=(pendBy[po.projeto_id]||0)+v;});
  const orcs=DATA.orcamentos||[];
  const byOrc={}; camps.forEach(p=>{ const k=p.orcamento_id||'—'; (byOrc[k]=byOrc[k]||[]).push(p); });
  const rows=[];
  orcs.forEach(o=>{
    (byOrc[o.id]||[]).forEach(p=>{
      const tot=tetoBy[p.id]||0, cons=consBy[p.id]||0, comp=compBy[p.id]||0, pnd=pendBy[p.id]||0;
      const rawc=tot?(cons+comp+pnd)/tot*100:0;
      const status=rawc>100.5?'Estourado':rawc>=90?'Próximo do limite':'Dentro do orçamento';
      const row={
        'Categoria': o.nome||o.product_category||'—',
        'Projeto': p.nome||'',
        'Fornecedor': p.agencia||'',
        'Atividade': actColLabel(actKey(p)),
        'Orçado (R$)': Math.round(tot*100)/100,
        'Consumido (R$)': Math.round(cons*100)/100,
        'Comprometido (R$)': Math.round(comp*100)/100,
        'Aguardando aprovação (R$)': Math.round(pnd*100)/100,
        '% Utilizado': Math.round(rawc),
        'Status': status
      };
      if(canSensitive){
        row['Tipo Rateio']=p.rateio?(p.rateio_tipo||''):'';
        const f=p.rateio?fee.find(x=>x.tipo===p.rateio_tipo&&x.categoria===o.product_category):null;
        row['Rateio %']=(f&&f.percentual!=null)?Math.round(f.percentual*1000)/10:'';
      }
      rows.push(row);
    });
  });
  return rows;
}
/* Mirrors feeSplitBlock()'s own "Cost center / account — monthly budget,
   consumption & balance" table verbatim (same accMap aggregation, same
   admin/finance-only gate) — one row per cost center/account/description,
   one Orçado/Consumido/Saldo triplet per month, plus the grand-total row. */
function costCenterExportRows(){
  const canSensitive=effIsManager()||['admin','financeiro'].includes(effPapel());
  if(!canSensitive) return null;
  const fee=DATA.fee||[];
  const campsAll=(DATA.poProjetos||[]).filter(p=>p.aprovacao_status==='APROVADO');
  const CONS_ST=['FATURADA','VALIDADA','CONCLUIDA','APROVADA','PO_GERADA','ATUALIZAR_INFO'];
  const accKey=(cc,acc,desc)=>`${cc||''}|${acc||''}|${desc||''}`;
  const accMap={};
  campsAll.forEach(p=>{
    const consByMonth={};
    DATA.pos.filter(po=>po.projeto_id===p.id&&CONS_ST.includes(po.status)).forEach(po=>{
      const m=String(po.competencia).slice(0,7); consByMonth[m]=(consByMonth[m]||0)+(+po.valor||0);
    });
    if(p.rateio){
      const monthCat={};
      (DATA.rateio||[]).filter(r=>r.projeto_id===p.id).forEach(r=>{
        const m=String(r.competencia).slice(0,7);
        monthCat[m]=monthCat[m]||{}; monthCat[m][r.categoria]=(monthCat[m][r.categoria]||0)+(+r.valor||0);
      });
      Object.keys(monthCat).forEach(m=>{
        const cats=monthCat[m]; const totalM=Object.values(cats).reduce((s,v)=>s+v,0)||1; const consM=consByMonth[m]||0;
        Object.keys(cats).forEach(cat=>{
          const f=fee.find(x=>x.tipo===p.rateio_tipo&&x.categoria===cat);
          const cc=f?f.cc:'', acc=f?f.account:'', desc=f?f.descricao:'';
          if(!cc&&!acc&&!desc)return;
          const key=accKey(cc,acc,desc);
          accMap[key]=accMap[key]||{cc,acc,desc,months:{},cons:{}};
          accMap[key].months[m]=(accMap[key].months[m]||0)+cats[cat];
          accMap[key].cons[m]=(accMap[key].cons[m]||0)+consM*(cats[cat]/totalM);
        });
      });
    } else {
      if(!p.cc&&!p.account&&!p.account_desc)return;
      const key=accKey(p.cc,p.account,p.account_desc);
      (DATA.tetos||[]).filter(t=>t.projeto_id===p.id).forEach(t=>{
        const m=String(t.competencia).slice(0,7);
        accMap[key]=accMap[key]||{cc:p.cc,acc:p.account,desc:p.account_desc,months:{},cons:{}};
        accMap[key].months[m]=(accMap[key].months[m]||0)+(+t.teto||0);
      });
      Object.keys(consByMonth).forEach(m=>{
        accMap[key]=accMap[key]||{cc:p.cc,acc:p.account,desc:p.account_desc,months:{},cons:{}};
        accMap[key].cons[m]=(accMap[key].cons[m]||0)+consByMonth[m];
      });
    }
  });
  const allMonths=new Set(); Object.values(accMap).forEach(a=>{Object.keys(a.months).forEach(m=>allMonths.add(m));Object.keys(a.cons).forEach(m=>allMonths.add(m));});
  const monthList=Array.from(allMonths).sort();
  const accRows=Object.values(accMap);
  const rows=accRows.map(a=>{
    const row={'Centro de custo':a.cc||'—','Conta':a.acc||'—','Descrição':a.desc||'—'};
    let totB=0,totC=0;
    monthList.forEach(m=>{
      const b=a.months[m]||0, c=a.cons[m]||0, label=fmtMes(m+'-01');
      totB+=b; totC+=c;
      row[`${label} - Orçado`]=Math.round(b*100)/100;
      row[`${label} - Consumido`]=Math.round(c*100)/100;
      row[`${label} - Saldo`]=Math.round((b-c)*100)/100;
    });
    row['Total - Orçado']=Math.round(totB*100)/100;
    row['Total - Consumido']=Math.round(totC*100)/100;
    row['Total - Saldo']=Math.round((totB-totC)*100)/100;
    return row;
  });
  if(rows.length){
    const totalRow={'Centro de custo':'Total','Conta':'','Descrição':''};
    let gB=0,gC=0;
    monthList.forEach(m=>{
      let b=0,c=0; accRows.forEach(a=>{b+=a.months[m]||0;c+=a.cons[m]||0;});
      const label=fmtMes(m+'-01');
      gB+=b; gC+=c;
      totalRow[`${label} - Orçado`]=Math.round(b*100)/100;
      totalRow[`${label} - Consumido`]=Math.round(c*100)/100;
      totalRow[`${label} - Saldo`]=Math.round((b-c)*100)/100;
    });
    totalRow['Total - Orçado']=Math.round(gB*100)/100;
    totalRow['Total - Consumido']=Math.round(gC*100)/100;
    totalRow['Total - Saldo']=Math.round((gB-gC)*100)/100;
    rows.push(totalRow);
  }
  return rows;
}
function exportBudgetXLSX(){
  if(!window.XLSX){ toast('Exportação indisponível — script não carregado.'); return; }

    <div class="modal-h" style="align-items:flex-start"><span style="width:7px;height:30px;border-radius:4px;background:var(--po);flex-shrink:0;margin-right:2px"></span><div style="flex:1"><h3>New campaign</h3><div style="font-size:11px;color:var(--txt-3);margin-top:1px">Activity → rateio → manual monthly distribution over the period</div></div><button class="x" onclick="closeModal()" aria-label="Close dialog">✕</button></div>
    <div class="modal-b">
      <div class="field full"><label>Campaign name</label><input value="${esc(CAMP.nome)}" onchange="CAMP.nome=this.value" placeholder="e.g. Mini LED Push" style="width:100%;padding:10px 12px;border:1px solid var(--line-2);border-radius:9px;background:var(--paper-2);font:inherit;font-size:13.5px"></div>
      <div class="fgrid" style="margin-top:14px">
        <div class="field"><label>Activity</label><select onchange="campSet('activity',this.value)">${ACT_OPTS.map(a=>`<option ${CAMP.activity===a?'selected':''}>${a}</option>`).join('')}</select></div>
        <div class="field"><label>Agency</label><select onchange="CAMP.agencia=this.value">${ags.map(a=>`<option ${CAMP.agencia===a?'selected':''}>${esc(a)}</option>`).join('')}${ags.length?'':'<option value="">—</option>'}</select></div>
      </div>
      <div class="field full"><label>Category <span style="font-weight:600;color:var(--txt-3)">(defines which budget funds it)</span></label><select onchange="campSet('orcamento_id',this.value)">${orcs.map(o=>`<option value="${o.id}" ${CAMP.orcamento_id===o.id?'selected':''}>${esc(o.nome||o.product_category)}</option>`).join('')||'<option value="">— no budget —</option>'}</select>${/fee/i.test(CAMP.activity||'')?'<div style="font-size:11.5px;color:var(--txt-3);margin-top:8px">Splitting a fee across categories (TV/AC/LABG…) is now done automatically when requesting the PO — create one campaign per category instead of a shared rateio.</div>':''}</div>
      <div style="border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:6px">
        <div style="padding:10px 14px;background:#fafbfd;border-bottom:1px solid var(--line);font-size:11px;font-weight:700;color:var(--txt-3);text-transform:uppercase;letter-spacing:.05em">Budget distribution by month — manual</div>
        <div style="padding:10px 14px;display:flex;flex-direction:column;gap:8px">
          ${CAMP.rows.map(r=>`<div style="display:flex;align-items:center;gap:9px"><input type="month" value="${esc(r.mes)}" onchange="campRowSet('${r.id}','mes',this.value)" style="padding:8px 10px;border:1px solid var(--line-2);border-radius:8px;background:#fff;font:inherit;font-size:12.5px"><input type="number" min="0" step="100" value="${esc(r.valor)}" onchange="campRowSet('${r.id}','valor',this.value)" placeholder="R$ 0" style="flex:1;padding:8px 10px;border:1px solid var(--line-2);border-radius:8px;background:#fff;font:inherit;font-size:12.5px;text-align:right" class="mono"><button class="chip-btn" onclick="campDelRow('${r.id}')">✕</button></div>`).join('')}
          <button class="btn-ghost" onclick="campAddRow()" style="align-self:flex-start;margin-top:2px">+ Add month</button>
        </div>
        <div style="padding:11px 14px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between"><b style="font-family:'Hanken Grotesk',sans-serif;font-size:13px">Total caps (sum of months)</b><span class="mono" style="font-size:15px;font-weight:800">${BRL(total)}</span></div>
      </div>
    </div>
    <div class="modal-f"><span></span><div style="display:flex;gap:10px"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-acc" style="background:var(--po)" onclick="submitCamp()">Create campaign</button></div></div>
  </div></div>`;
}
async function submitCamp(){
  if(!CAMP)return;
  if(!CAMP.nome.trim()){ toast('Give the campaign a name.'); return; }
  if(!CAMP.orcamento_id){ toast('Choose a budget.'); return; }
  const rows=CAMP.rows.filter(r=>r.mes&&(+r.valor||0)>0);
  if(!rows.length){ toast('Add at least one month with a value.'); return; }
  const orc=(DATA.orcamentos||[]).find(o=>o.id===CAMP.orcamento_id); const cat=orc?(orc.product_category||orc.nome||''):'';
  // Same over-budget check the server enforces at approval time (aprovar_projeto),
  // surfaced here instead so the requester sees the block immediately when trying
  // to save — not later, as a surprise to whoever approves it.
  if(orc&&(+orc.valor_total||0)){
    const pStart=orc.periodo_inicio?String(orc.periodo_inicio).slice(0,10):null;
    const pEnd=orc.periodo_fim?String(orc.periodo_fim).slice(0,10):null;
    const inPeriod=mYYYYMM=>{ const d=mYYYYMM+'-01'; return (!pStart||d>=pStart)&&(!pEnd||d<=pEnd); };
    const vAloc=rows.filter(r=>inPeriod(r.mes)).reduce((s,r)=>s+(+r.valor||0),0);
    const approvedIds=new Set((DATA.poProjetos||[]).filter(p=>p.orcamento_id===CAMP.orcamento_id&&p.aprovacao_status==='APROVADO').map(p=>p.id));
    const vUsado=(DATA.tetos||[]).filter(t=>approvedIds.has(t.projeto_id)&&inPeriod(String(t.competencia).slice(0,7))).reduce((s,t)=>s+(+t.teto||0),0);
    const total=+orc.valor_total||0;
    if(vAloc+vUsado>total+0.5){
      toast(`This would exceed the "${esc(orc.nome||cat)}" budget: ${BRL(vAloc)} requested + ${BRL(vUsado)} already committed exceeds the ${BRL(total)} total. Reduce the values or pick a different budget.`);
      return;
    }
  }
  if(DEMO_MODE){
    const pid='demo-p-'+uid();
    DATA.poProjetos.push({id:pid,nome:CAMP.nome.trim(),agencia:CAMP.agencia||null,orcamento_id:CAMP.orcamento_id,product_category:cat,activity:CAMP.activity||null,rateio:false,aprovacao_status:'PENDENTE',dono:(currentUser&&currentUser.email)||''});
    rows.forEach(r=>DATA.tetos.push({projeto_id:pid,competencia:r.mes+'-01',teto:Math.round(+r.valor)}));
    toast('Campaign created ✓ (demo — now awaiting approval)'); closeModal(); go('campaigns');
    return;
  }
  if(viewOnly()){toast(roMsg());return;}
  try{
    let cc='',account='',account_desc='';
    try{ const {data:cls}=await SBPO.rpc('classificar',{p_d:cat,p_e:CAMP.activity||'',p_f:''}); const c=(cls&&cls[0])||{}; cc=c.cc||''; account=c.account||''; account_desc=c.descricao||''; }catch(e){}
    const campos={nome:CAMP.nome.trim(),agencia:CAMP.agencia||null,orcamento_id:CAMP.orcamento_id,product_category:cat,activity:CAMP.activity||null,cc,account,account_desc,rateio:false,rateio_tipo:null,criado_por:'portal'};
    const {data:proj,error}=await SBPO.from('projetos').insert(campos).select().single();
    if(error)throw error;
    const pid=proj.id;
    {
      const tetos=rows.map(r=>({projeto_id:pid,competencia:r.mes+'-01',teto:Math.round(+r.valor),definido_por:'portal'}));
      const {error:e2}=await SBPO.from('tetos').upsert(tetos,{onConflict:'projeto_id,competencia'}); if(e2)throw e2;
    }
    toast('Campaign created ✓'); closeModal(); await reloadPOAll(); go('campaigns');
  }catch(e){ toast('Error: '+(e.message||e)); }
}

let ORC=null;
window.deletarOrcamento=deletarOrcamento;window.deletarCampanha=deletarCampanha;window.deletarPO=deletarPO;
/* Budgets are strictly one per product category — fixed list, no duplicates. */
function usedCats(){ return new Set((DATA.orcamentos||[]).map(o=>String(o.product_category||o.nome||'').trim().toUpperCase()).filter(Boolean)); }
function openOrcNew(){ const nowM=new Date().toISOString().slice(0,7); const free=PRODUCT_CATS.filter(c=>!usedCats().has(c)); ORC={id:null,cat:free[0]||'',valor:'',ini:nowM,fim:nowM}; renderOrcForm(); }
function openOrcEdit(id){ const o=(DATA.orcamentos||[]).find(x=>x.id===id); if(!o)return; ORC={id:o.id,cat:(o.product_category||o.nome||'').toUpperCase(),valor:o.valor_total!=null?o.valor_total:'',ini:o.periodo_inicio?String(o.periodo_inicio).slice(0,7):'',fim:o.periodo_fim?String(o.periodo_fim).slice(0,7):''}; renderOrcForm(); }
function renderOrcForm(){
  if(!ORC)return;
  const editing=!!ORC.id;
  const used=usedCats(); const free=PRODUCT_CATS.filter(c=>!used.has(c));
  const opts=free.length?free.map(c=>`<option value="${esc(c)}" ${ORC.cat===c?'selected':''}>${esc(c)}</option>`).join(''):'';
  const catField=editing
    ? `<div class="field"><label>Product category</label><input value="${esc(ORC.cat)}" disabled style="width:100%;padding:10px 12px;border:1px solid var(--line-2);border-radius:9px;background:#f3f4f6;font:inherit;font-size:13.5px;color:var(--txt-2)"></div>`
    : `<div class="field"><label>Product category <span style="font-weight:600;color:var(--txt-3)">(one budget per category)</span></label><select onchange="ORC.cat=this.value">${opts}</select></div>`;
  const body=(editing||free.length)
    ? `${catField}
      <div class="field"><label>Total value (R$)</label><input type="number" min="0" step="1000" value="${esc(ORC.valor)}" onchange="ORC.valor=this.value" class="mono" placeholder="0,00"></div>
      <div class="fgrid">
        <div class="field"><label>Start</label><input type="month" value="${esc(ORC.ini)}" onchange="ORC.ini=this.value"></div>
        <div class="field"><label>End</label><input type="month" value="${esc(ORC.fim)}" onchange="ORC.fim=this.value"></div>
      </div>`
    : `<div class="banner">All product categories (${PRODUCT_CATS.join(', ')}) already have a budget. Edit the existing one instead of creating a duplicate.</div>`;
  $('#modalMount').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div role="dialog" aria-modal="true" class="modal" style="max-width:480px">
    <div class="modal-h"><h3>${editing?'Edit budget — '+esc(ORC.cat):'New budget'}</h3><button class="x" onclick="closeModal()" aria-label="Close dialog">✕</button></div>
    <div class="modal-b">${body}</div>
    <div class="modal-f"><span>${(editing&&PAPEL==='admin'&&!viewOnly())?`<button class="btn-del" onclick="deletarOrcamento('${esc(ORC.id)}')">Delete budget</button>`:''}</span><div style="display:flex;gap:10px"><button class="btn-ghost" onclick="closeModal()">Cancel</button>${(editing||free.length)?`<button class="btn-acc" style="background:var(--po)" onclick="submitOrc()">${editing?'Save':'Create budget'}</button>`:''}</div></div>
  </div></div>`;
}
async function submitOrc(){
  if(viewOnly()){toast(roMsg());return;}
  if(!ORC)return;
  const cat=String(ORC.cat||'').trim().toUpperCase();
  const val=+ORC.valor||0; if(val<0){ toast('Enter a valid value.'); return; }
  // Block lowering an existing budget below what's already allocated to its
  // approved campaigns — same idea as the campaign-side check in submitCamp():
  // surface it here, at save time, instead of leaving the budget silently
  // inconsistent (total < committed).
  if(ORC.id){
    const approvedIds=new Set((DATA.poProjetos||[]).filter(p=>p.orcamento_id===ORC.id&&p.aprovacao_status==='APROVADO').map(p=>p.id));
    const pStart=ORC.ini?ORC.ini+'-01':null, pEnd=ORC.fim?ORC.fim+'-01':null;
    const inPeriod=comp=>{ const d=String(comp).slice(0,10); return (!pStart||d>=pStart)&&(!pEnd||d<=pEnd); };
    const vUsado=(DATA.tetos||[]).filter(t=>approvedIds.has(t.projeto_id)&&inPeriod(t.competencia)).reduce((s,t)=>s+(+t.teto||0),0);
    if(val<vUsado-0.5){
      toast(`Can't set the total below ${BRL(vUsado)} — that's already allocated to approved campaigns in this budget.`);
      return;
    }
  }
  try{
    if(ORC.id){
      const {error}=await SBPO.from('orcamentos').update({valor_total:val,periodo_inicio:ORC.ini?ORC.ini+'-01':null,periodo_fim:ORC.fim?ORC.fim+'-01':null}).eq('id',ORC.id);
      if(error)throw error;
      toast('Budget updated ✓');
    }else{
      if(!PRODUCT_CATS.includes(cat)){ toast('Pick a product category.'); return; }
      if(usedCats().has(cat)){ toast('A budget for '+cat+' already exists.'); return; }
      if(val<=0){ toast('Enter the total value.'); return; }
      const {error}=await SBPO.rpc('criar_orcamento',{p_nome:cat,p_valor:val,p_inicio:ORC.ini?ORC.ini+'-01':null,p_fim:ORC.fim?ORC.fim+'-01':null});
      if(error)throw error;
      toast('Budget created ✓');
    }
    closeModal(); await reloadPOAll(); go('budgets');
  }catch(e){ toast('Error: '+(e.message||e)); }
}

let FEE=null;
function openFeeEditor(){ FEE=(DATA.fee||[]).map(f=>({agencia:f.agencia||'',tipo:FEE_TIPOS.some(([v])=>v===f.tipo)?f.tipo:'AGENCIA',categoria:f.categoria||'',percentual:f.percentual!=null?Math.round(f.percentual*1000)/10:'',cc:f.cc||'',account:f.account||'',descricao:f.descricao||''})); if(!FEE.length)FEE=[{agencia:'',tipo:'AGENCIA',categoria:'',percentual:'',cc:'',account:'',descricao:''}]; renderFeeEditor(); }
function feeRowSet(i,k,v){ if(FEE&&FEE[i])FEE[i][k]=v; }
function feeAddRow(){ FEE.push({agencia:'',tipo:'AGENCIA',categoria:'',percentual:'',cc:'',account:'',descricao:''}); renderFeeEditor(); }
function feeDelRow(i){ FEE.splice(i,1); renderFeeEditor(); }
/* NOTE: `tipo` is constrained by the DB (fee_rateio_tipo_check) to exactly
   'AGENCIA' or 'KOL' — it is a classifier of the split, not a free-text name.
   `agencia` is the free-text agency name. Rendering `tipo` as free text (as
   this editor used to) let people type anything and made every save fail
   the check constraint — that was the "error editing rateios" bug. Keep
   `tipo` a closed select so every row is always save-able. */
const FEE_TIPOS=[['AGENCIA','Agency fee'],['KOL','KOL fee']];
function renderFeeEditor(){
  if(!FEE)return;
  const inp=(i,k,ph,w)=>`<input value="${esc(FEE[i][k])}" onchange="feeRowSet(${i},'${k}',this.value)" placeholder="${ph}" style="width:${w||'100%'};padding:6px 8px;border:1px solid var(--line-2);border-radius:7px;background:#fff;font:inherit;font-size:12px">`;
  const tipoSel=(i,f)=>`<select onchange="feeRowSet(${i},'tipo',this.value)" style="width:100%;padding:6px 8px;border:1px solid var(--line-2);border-radius:7px;background:#fff;font:inherit;font-size:12px">${FEE_TIPOS.map(([v,l])=>`<option value="${v}" ${f.tipo===v?'selected':''}>${l}</option>`).join('')}</select>`;
  const rows=FEE.map((f,i)=>`<div style="display:grid;grid-template-columns:1fr 1fr .8fr .6fr 1fr 1fr 1.4fr 24px;gap:7px;align-items:center;margin-bottom:7px">
    ${inp(i,'agencia','Agency')}${tipoSel(i,f)}${inp(i,'categoria','Category')}<input type="number" value="${esc(f.percentual)}" onchange="feeRowSet(${i},'percentual',this.value)" placeholder="%" style="padding:6px 8px;border:1px solid var(--line-2);border-radius:7px;background:#fff;font:inherit;font-size:12px;text-align:right" class="mono">${inp(i,'cc','Cost center')}${inp(i,'account','Account')}${inp(i,'descricao','Description')}<button onclick="feeDelRow(${i})" style="width:24px;height:24px;border-radius:6px;border:none;background:transparent;color:var(--txt-3);font-size:11px;cursor:pointer">✕</button>
  </div>`).join('');
  $('#modalMount').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div role="dialog" aria-modal="true" class="modal" style="max-width:920px">
    <div class="modal-h"><h3>Fee split configuration (rateio)</h3><button class="x" onclick="closeModal()" aria-label="Close dialog">✕</button></div>
    <div class="modal-b">
      <div style="font-size:11.5px;color:var(--txt-3);margin-bottom:10px">Define how a shared invoice is split across categories by fixed percentages. % is per row; each row carries its cost center and account for the payment process.</div>
      <div style="display:grid;grid-template-columns:1fr 1fr .8fr .6fr 1fr 1fr 1.4fr 24px;gap:7px;font-size:10px;font-weight:700;color:var(--txt-3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px"><span>Agency</span><span>Type</span><span>Category</span><span style="text-align:right">%</span><span>Cost center</span><span>Account</span><span>Description</span><span></span></div>
      ${rows}
      <button class="btn-ghost" onclick="feeAddRow()" style="margin-top:4px">+ Add split row</button>
    </div>
    <div class="modal-f"><span></span><div style="display:flex;gap:10px"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-acc" style="background:var(--po)" onclick="saveFee()">Save splits</button></div></div>
  </div></div>`;
}
async function saveFee(){
  if(viewOnly()){toast(roMsg());return;}
  if(!FEE)return;
  const rows=FEE.filter(f=>(f.agencia||'').trim()&&FEE_TIPOS.some(([v])=>v===f.tipo)).map(f=>({agencia:f.agencia.trim(),tipo:f.tipo,categoria:(f.categoria||'').trim(),percentual:(+f.percentual||0)/100,cc:(f.cc||'').trim(),account:(f.account||'').trim(),descricao:(f.descricao||'').trim()}));
  try{
    await SBPO.from('fee_rateio').delete().not('agencia','is',null);
    if(rows.length){ const {error}=await SBPO.from('fee_rateio').insert(rows); if(error)throw error; }
    const {data:fee}=await SBPO.from('fee_rateio').select('agencia,tipo,categoria,percentual,cc,account,descricao'); DATA.fee=fee||[];
    toast('Fee splits saved ✓'); closeModal(); go('budgets');
  }catch(e){ toast('Error: '+(e.message||e)); }
}

/* ============================================================
   INIT
   ============================================================ */
boot();
</script>
