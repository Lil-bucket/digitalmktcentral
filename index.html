<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCL Platform — Work + Budget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  :root{
    --ink:#14161c; --ink-2:#1c1f28; --ink-3:#262a36;
    --paper:#f4f3ef; --paper-2:#fbfaf7; --card:#fff;
    --line:#e3e1da; --line-2:#d3d0c6;
    --txt:#1a1c22; --txt-2:#5d6068; --txt-3:#8b8d95;
    --accent:#ff5436; --accent-deep:#d83f24; --po:#e20613;
    --green:#16a06a; --green-bg:#e4f5ec; --amber:#d68a04; --amber-bg:#fbf0d8;
    --red:#e0392b; --red-bg:#fbe4e1; --violet:#6d4bd1; --violet-bg:#ece6fa;
    --blue:#2f6fd8; --blue-bg:#e3edfb; --slate:#5d6068; --slate-bg:#ecebe6;
    --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'DM Sans',system-ui,sans-serif;background:var(--paper);color:var(--txt);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4{font-family:'Sora',sans-serif;letter-spacing:-.02em;font-weight:700}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#cfccc3;border-radius:6px;border:2px solid var(--paper)}

  /* ===== AUTH GATE ===== */
  .gate{position:fixed;inset:0;z-index:200;background:var(--ink);display:none;align-items:center;justify-content:center;padding:24px}
  .gate.show{display:flex}
  .gate-card{background:var(--card);border-radius:18px;padding:38px 32px;max-width:390px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.45)}
  .gate-logo{width:52px;height:52px;border-radius:13px;background:linear-gradient(135deg,#ff5436 50%,#e20613 50%);color:#fff;font-family:'Sora';font-weight:800;font-size:24px;display:grid;place-items:center;margin:0 auto 16px}
  .gate-card h2{font-size:20px;margin-bottom:6px}
  .gate-card p{font-size:13px;color:var(--txt-2);line-height:1.5;margin-bottom:20px}
  .gate-inp{width:100%;background:var(--paper);border:1px solid var(--line);color:var(--txt);border-radius:11px;padding:12px 14px;font:inherit;font-size:14px;margin-bottom:10px;outline:none}
  .gate-inp:focus{border-color:var(--accent);background:#fff}
  .gate-btn{width:100%;justify-content:center;display:inline-flex;align-items:center;gap:10px;background:var(--ink);color:#fff;padding:12px 22px;border-radius:11px;font-weight:700;font-size:14px;cursor:pointer;margin-top:2px}
  .gate-btn:hover{background:var(--accent)}
  .gate-btn:disabled{opacity:.6;cursor:default}
  .gate-links{display:flex;justify-content:space-between;gap:10px;margin-top:14px}
  .gate-links a{color:var(--txt-2);font-size:12.5px;cursor:pointer}
  .gate-links a:hover{color:var(--accent);text-decoration:none}
  .hide{display:none!important}

  /* ===== SHELL ===== */
  .app{display:flex;min-height:100vh}
  .side{width:228px;flex-shrink:0;background:var(--ink);color:#d6d8df;padding:20px 12px;display:flex;flex-direction:column;gap:2px;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:10px;padding:2px 8px 16px}
  .brand .dot{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#ff5436 50%,#e20613 50%);display:grid;place-items:center;font-family:'Sora';font-weight:800;color:#fff;font-size:15px}
  .brand b{font-family:'Sora';color:#fff;font-size:14px;font-weight:700;display:block;line-height:1.1}
  .brand span{font-size:10px;color:#7e828e;letter-spacing:.06em;text-transform:uppercase}
  .nav-sec{font-size:9.5px;font-weight:800;letter-spacing:.15em;padding:12px 10px 5px}
  .nav-sec.work{color:var(--accent)} .nav-sec.budget{color:#ef7f88}
  .nav-btn{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;color:#a4a7b2;font-weight:600;font-size:12.5px;width:100%;text-align:left;transition:.15s}
  .nav-btn:hover{background:var(--ink-2);color:#fff}
  .nav-btn.on{background:var(--ink-3);color:#fff}
  .nav-btn .dot2{width:6px;height:6px;border-radius:2px;flex-shrink:0}
  .nav-btn .badge{margin-left:auto;background:var(--po);color:#fff;border-radius:10px;padding:0 7px;font-size:10px;font-weight:800}
  .side-foot{margin-top:auto;padding-top:12px;border-top:1px solid #2a2d38;display:flex;flex-direction:column;gap:4px}
  .side-foot .acct{display:flex;align-items:center;gap:8px;padding:8px 10px;color:#8b8e98;font-size:11px;font-weight:600}
  .side-foot .acct .av{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:10px;font-weight:800;flex-shrink:0}
  .side-foot .acct span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .side-foot button{padding:8px 10px;border-radius:8px;background:var(--ink-2);color:#cfd2da;font-size:11.5px;font-weight:600;text-align:left}
  .side-foot button:hover{background:var(--ink-3);color:#fff}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .top{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 28px;border-bottom:1px solid var(--line);background:var(--paper-2);position:sticky;top:0;z-index:20}
  .top .tl{display:flex;align-items:center;gap:12px;min-width:0}
  .top .barcol{width:8px;height:30px;border-radius:4px;flex-shrink:0}
  .top h1{font-size:19px;margin:0}
  .top .sub{font-size:12px;color:var(--txt-3);margin-top:1px}
  .view{flex:1;padding:24px 28px 48px;overflow-y:auto}

  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px 14px 12px;position:relative;overflow:hidden;box-shadow:0 1px 2px rgba(20,22,28,.05)}
  .kpi .bar{position:absolute;left:0;top:0;bottom:0;width:4px}
  .kpi .lbl{font-size:10.5px;color:var(--txt-2);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .kpi .num{font-family:'Sora';font-size:28px;font-weight:800;margin-top:7px;letter-spacing:-.03em}
  .kpi .meta{font-size:11px;color:var(--txt-3);margin-top:4px}
  .grid2{display:grid;grid-template-columns:1.45fr 1fr;gap:18px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden;box-shadow:0 1px 2px rgba(20,22,28,.05)}
  .panel-h{padding:14px 17px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .panel-h h3{font-size:14px}.panel-h .tag{font-size:11px;color:var(--txt-3);font-weight:600}
  .panel-b{padding:6px 8px}
  .row-item{display:flex;gap:11px;padding:12px 11px;border-radius:10px;align-items:flex-start;cursor:pointer}
  .row-item:hover{background:var(--paper)}
  .pin{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
  .rt{text-align:right;flex-shrink:0}
  .who{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;background:var(--ink);color:#fff;padding:2px 9px;border-radius:20px;margin-top:6px}
  .empty{text-align:center;padding:30px 16px;color:var(--txt-3);font-size:13px}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .badge .d{width:6px;height:6px;border-radius:50%}
  .s-green{background:var(--green-bg);color:#0c7048}.s-green .d{background:var(--green)}
  .s-amber{background:var(--amber-bg);color:#9c6404}.s-amber .d{background:var(--amber)}
  .s-red{background:var(--red-bg);color:#b32418}.s-red .d{background:var(--red)}
  .s-violet{background:var(--violet-bg);color:#5535ad}.s-violet .d{background:var(--violet)}
  .s-blue{background:var(--blue-bg);color:#1f53a8}.s-blue .d{background:var(--blue)}
  .s-slate{background:var(--slate-bg);color:#494c54}.s-slate .d{background:var(--slate)}
  .avatar{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:10.5px;font-weight:700;color:#fff;flex-shrink:0}
  .tbl-wrap{background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden;box-shadow:0 1px 2px rgba(20,22,28,.05)}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;font-weight:700;color:var(--txt-3);text-transform:uppercase;letter-spacing:.05em;padding:12px 16px;border-bottom:1px solid var(--line);background:var(--paper-2);white-space:nowrap}
  td{padding:12px 16px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--paper)}
  th.r,td.r{text-align:right}
  .prog{height:6px;background:var(--line);border-radius:6px;overflow:hidden;width:90px}
  .prog i{display:block;height:100%;border-radius:6px}
  .meter{height:22px;border-radius:7px;overflow:hidden;display:flex;border:1px solid var(--line);background:#f3f4f6}
  .meter span{display:block;height:100%}
  .stage-tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
  .banner{background:#fff7e6;border:1px solid #f0dca8;color:#8a6300;padding:11px 14px;border-radius:10px;font-size:12.5px;margin-bottom:18px}
  .loading{display:grid;place-items:center;height:60vh;color:var(--txt-3);font-size:14px}

  /* ===== MODAL ===== */
  .overlay{position:fixed;inset:0;background:rgba(20,22,28,.45);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:36px 20px;overflow-y:auto}
  .modal{background:#fff;border-radius:18px;width:100%;max-width:840px;box-shadow:0 24px 60px -24px rgba(20,22,28,.4)}
  .modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .modal-h h3{font-size:17px}
  .modal-h .x{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--txt-3);font-size:18px}
  .modal-h .x:hover{background:var(--paper);color:var(--txt)}
  .modal-b{padding:20px 22px;max-height:74vh;overflow-y:auto}
  .modal-f{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px}
  .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field{margin-bottom:14px}.field.full{grid-column:1/-1}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--txt-2);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--line-2);border-radius:9px;background:var(--paper-2);font:inherit;font-size:13.5px;color:var(--txt);outline:none}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(255,84,54,.12)}
  .btn-acc{padding:10px 18px;border-radius:9px;background:var(--accent);color:#fff;font-weight:700;font-size:13.5px}
  .btn-acc:hover{background:var(--accent-deep)}
  .btn-ghost{padding:10px 16px;border-radius:9px;font-weight:600;font-size:13.5px;color:var(--txt-2);border:1px solid var(--line-2)}
  .btn-ghost:hover{background:var(--paper)}
  .btn-del{padding:10px 14px;border-radius:9px;font-weight:600;font-size:13px;color:var(--red)}
  .btn-del:hover{background:var(--red-bg)}
  .atv{border:1px solid var(--line-2);border-radius:11px;padding:12px;margin-bottom:9px;background:#fff}
  .atv.done{background:#eef8f1;border-color:#bfe4d0}
  .atv-top{display:flex;align-items:center;gap:10px}
  .atv-top input.nm{flex:1;padding:8px 10px;border:1px solid var(--line-2);border-radius:8px;background:var(--paper-2);font-weight:600;font-size:13.5px}
  .atv-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px;align-items:center}
  .atv-meta input,.atv-meta select{padding:6px 9px;border:1px solid var(--line-2);border-radius:7px;background:#fff;font:inherit;font-size:12px}
  .chip-btn{font-size:11px;font-weight:600;color:var(--txt-2);border:1px solid var(--line-2);border-radius:7px;padding:5px 9px}
  .chip-btn:hover{border-color:var(--accent);color:var(--accent)}
  .sub{display:flex;align-items:center;gap:7px;margin-top:5px;padding-left:6px}
  .sub input.st{flex:1;padding:5px 9px;border:1px solid var(--line-2);border-radius:6px;background:transparent;font:inherit;font-size:12.5px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 22px;border-radius:11px;font-weight:600;font-size:13.5px;opacity:0;transition:.3s;z-index:300}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .ment{background:var(--violet-bg);color:var(--violet);font-weight:700;border-radius:4px;padding:0 4px}
</style>
</head>
<body>

<!-- ===== AUTH GATE ===== -->
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-logo">T</div>
    <h2>TCL Platform</h2>
    <p id="gateMsg">Sign in with your corporate email.</p>
    <div id="gateLogin">
      <input id="liEmail" class="gate-inp" type="email" placeholder="seu.email@tclsemp.com.br" autocomplete="username">
      <input id="liSenha" class="gate-inp" type="password" placeholder="Senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="gate-btn" onclick="doLogin()">Sign in</button>
      <div class="gate-links"><a onclick="gateTo('primeiro')">First access</a><a onclick="gateTo('esqueci')">Forgot password</a></div>
    </div>
    <div id="gateCode" class="hide">
      <input id="caEmail" class="gate-inp" type="email" placeholder="seu.email@tclsemp.com.br" autocomplete="username">
      <button class="gate-btn" id="caSendBtn" onclick="sendCode()">Send code</button>
      <div id="caStep2" class="hide">
        <input id="caCode" class="gate-inp" type="text" inputmode="numeric" placeholder="Code received by email" style="margin-top:10px">
        <input id="caSenha" class="gate-inp" type="password" placeholder="Create a password (min. 6)" autocomplete="new-password" onkeydown="if(event.key==='Enter')setPassword()">
        <button class="gate-btn" onclick="setPassword()">Set password and sign in</button>
      </div>
      <div class="gate-links"><a onclick="gateTo('login')">← Back to login</a></div>
    </div>
  </div>
</div>

<!-- ===== APP ===== -->
<div class="app" id="app" style="display:none">
  <aside class="side">
    <div class="brand"><div class="dot">T</div><div><b>TCL Platform</b><span>Work + Budget</span></div></div>
    <div id="navWork"></div>
    <div id="navBudget"></div>
    <div class="side-foot">
      <div class="acct"><span class="av" id="acctAv">?</span><span id="acctEmail">—</span></div>
      <div id="poDiag" style="font-size:10px;color:#7e828e;padding:0 10px 4px"></div>
      <button onclick="signOut()">Sign out</button>
    </div>
  </aside>
  <main class="main">
    <header class="top">
      <div class="tl"><span class="barcol" id="barcol"></span><div><h1 id="scrTitle">Dashboard</h1><div class="sub" id="scrSub"></div></div></div>
      <div id="ctaBox"></div>
    </header>
    <section class="view" id="view"><div class="loading">Loading…</div></section>
  </main>
</div>
<div id="modalMount"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONFIG — dois Supabase (reaproveitado dos apps existentes)
   ============================================================ */
const PANEL_URL='https://ydfocnclwunnskznrhja.supabase.co';
const PANEL_KEY='sb_publishable_ZqcFVrOwKhfipKbFSNaGlg_YYo6tv81';
const PO_URL='https://uryzzerzmmuwuqxjwwec.supabase.co';
const PO_KEY='sb_publishable_6DGDsBzRZoT1LQwRr3UCUQ_EHmh-B3J';
const MANAGER_EMAILS=['lucas.baldim@tclsemp.com.br'];

const SB   = window.supabase.createClient(PANEL_URL, PANEL_KEY, {auth:{storageKey:'sb-ydfocnclwunnskznrhja-auth-token'}});
const SBPO = window.supabase.createClient(PO_URL,    PO_KEY,    {auth:{storageKey:'sb-uryzzerzmmuwuqxjwwec-auth-token'}});

/* ============================================================
   STATE
   ============================================================ */
let currentUser=null, isManager=false, booted=false, _senha='';
let PO_ACCESS=false, PAPEL='', MINHA_AGENCIA='';
let DATA={projetos:[], orcamentos:[], poProjetos:[], pos:[], tetos:[], rateio:[], notif:[], mencoes:[], pessoas:[], fee:[]};
let TEAM=[];
let SCREEN='dash';

/* domain models (do painel) */
const STAGES=[{id:'briefing',name:'Briefing',color:'#8b8d95'},{id:'producao',name:'In Production',color:'#2f6fd8'},{id:'revisao',name:'Review/Approval',color:'#d68a04'},{id:'ajustes',name:'Adjustments',color:'#6d4bd1'},{id:'entrega',name:'Delivery',color:'#16a06a'},{id:'concluido',name:'Completed',color:'#5d6068'}];
const STATUS=[{id:'no_prazo',name:'On track',cls:'s-green'},{id:'atencao',name:'At risk',cls:'s-amber'},{id:'atrasado',name:'Late',cls:'s-red'},{id:'bloqueado',name:'Blocked',cls:'s-violet'},{id:'concluido',name:'Completed',cls:'s-blue'}];
const PO_STATUS={
  SOLICITADA:{t:'Solicitada',c:'s-slate',icon:'🕓'}, EM_APROVACAO:{t:'Em aprovação',c:'s-amber',icon:'🕓'},
  APROVADA:{t:'Aprovada',c:'s-blue',icon:'✓'}, REJEITADA:{t:'Rejeitada',c:'s-red',icon:'✕'},
  PO_GERADA:{t:'PO gerada',c:'s-green',icon:'📄'}, ATUALIZAR_INFO:{t:'Atualizar info',c:'s-amber',icon:'✎'},
  FATURADA:{t:'Faturada',c:'s-amber',icon:'💰'}, VALIDADA:{t:'Validada',c:'s-green',icon:'✓'},
  CONCLUIDA:{t:'Concluída',c:'s-green',icon:'✔'}, CANCELADA:{t:'Cancelada',c:'s-slate',icon:'✕'}
};
const AV_COLORS=['#ff5436','#2f6fd8','#6d4bd1','#16a06a','#e20613','#d68a04','#0ea5a5','#bd9f68'];

/* tipos de projeto → padrão de atividades (editável na criação) */
const TYPES=[
  {id:'campanha',name:'Campaign / Launch',tasks:['Briefing & objectives','Strategy & concept','Concept approval','Creative production (agency)','Internal review','Adjustments','Final approval','Media plan','Delivery','Wrap-up / report']},
  {id:'conteudo',name:'Content / Social',tasks:['Agenda & briefing','Script / copy','Copy review','Production (design/video)','Approval','Scheduling','Publishing','Metrics']},
  {id:'evento',name:'Event',tasks:['Concept & scope','Budget & vendors','Logistics & schedule','Materials production','Promotion','Event execution','Post-event / report']},
  {id:'trade',name:'Trade / POS',tasks:['Trade briefing','Layout & materials','Approval','Print production','Distribution','POS execution','Check & report']},
  {id:'livre',name:'Free project',tasks:['Planning','Execution','Review','Delivery']}
];
function typeOf(i){return TYPES.find(t=>t.id===i)||TYPES[TYPES.length-1];}
const CAT_CHIPS=['Trade','Digital','Media','Content','Events','PR','Retail'];
const BRAND_CHIPS=['TCL','SEMP','TCL + SEMP'];
const uid=()=>'x'+Math.random().toString(36).slice(2,9);
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function canEdit(p){return isManager||!p||!p.owner||p.owner===(currentUser&&currentUser.email);}
function visProjs(){ if(PAPEL==='agencia'&&MINHA_AGENCIA) return DATA.projetos.filter(p=>p.partner===MINHA_AGENCIA||p.agencia===MINHA_AGENCIA||(p.agencies||[]).includes(MINHA_AGENCIA)); return DATA.projetos; }

/* ============================================================
   HELPERS
   ============================================================ */
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const BRL=n=>'R$ '+Math.round(+n||0).toLocaleString('pt-BR');
function avColor(n){let h=0;for(const c of(n||'?'))h=c.charCodeAt(0)+((h<<5)-h);return AV_COLORS[Math.abs(h)%AV_COLORS.length];}
function initials(n){if(!n)return'?';const p=String(n).trim().split(/\s+/);return((p[0]||'')[0]||'').toUpperCase()+((p[1]||'')[0]||'').toUpperCase();}
function today0(){const d=new Date();d.setHours(0,0,0,0);return d;}
function daysTo(s){if(!s)return null;const d=new Date(s+'T00:00:00');return Math.round((d-today0())/864e5);}
function fmtDate(s){if(!s)return'—';const d=new Date(s+'T00:00:00');return d.toLocaleDateString('en-US',{day:'2-digit',month:'short'});}
function fmtMes(s){if(!s)return'—';const [y,m]=String(s).slice(0,7).split('-');const MM=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return (MM[(+m)-1]||m)+'/'+String(y).slice(2);}
function stageOf(i){return STAGES.find(s=>s.id===i)||STAGES[0];}
function statusOf(i){return STATUS.find(s=>s.id===i)||STATUS[0];}
function taskDays(t){if(t&&t.inicio&&t.fim){const d=Math.round((new Date(t.fim+'T00:00:00')-new Date(t.inicio+'T00:00:00'))/864e5)+1;return d>0?d:1;}return Math.max(1,+(t&&t.w)||1);}
function computeProg(p){if(!p.tasks||!p.tasks.length)return p.prog||0;const tw=p.tasks.reduce((s,t)=>s+taskDays(t),0);const dw=p.tasks.filter(t=>t.done).reduce((s,t)=>s+taskDays(t),0);return tw?Math.round(dw/tw*100):0;}
function autoEtapa(p){const prog=computeProg(p);if(prog>=100)return'concluido';const w=['briefing','producao','revisao','ajustes','entrega'];let i=Math.floor(prog/100*w.length);if(i>4)i=4;if(i<0)i=0;return w[i];}
function autoStatus(p){const prog=computeProg(p);if(prog>=100)return'concluido';if(p.bloqueado)return'bloqueado';const dd=p.prazo?daysTo(p.prazo):null;if(dd!==null&&dd<0)return'atrasado';const overdue=(p.tasks||[]).some(t=>!t.done&&t.fim&&daysTo(t.fim)<0);if(overdue)return'atencao';return'no_prazo';}
function latestLog(p){return p.logs&&p.logs.length?p.logs[p.logs.length-1]:null;}
function deadlineInfo(p){if(autoStatus(p)==='concluido')return{cls:'ok',txt:fmtDate(p.prazo),sub:'completed',color:'var(--slate)'};const dd=daysTo(p.prazo);if(dd===null)return{cls:'ok',txt:'—',sub:'',color:'var(--txt-3)'};if(dd<0)return{cls:'late',txt:fmtDate(p.prazo),sub:Math.abs(dd)+'d late',color:'var(--red)'};if(dd<=5)return{cls:'soon',txt:fmtDate(p.prazo),sub:'in '+dd+'d',color:'var(--amber)'};return{cls:'ok',txt:fmtDate(p.prazo),sub:'in '+dd+'d',color:'var(--txt-2)'};}

function gateTo(mode){
  $('#gateLogin').classList.toggle('hide',mode!=='login');
  $('#gateCode').classList.toggle('hide',mode==='login');
  if(mode!=='login'){$('#caStep2').classList.add('hide');const cs=$('#caSendBtn');cs.classList.remove('hide');cs.textContent='Send code';}
  $('#gateMsg').textContent=mode==='login'?'Sign in with your corporate email.':(mode==='primeiro'?'First access: get a code by email to create your password.':'Get a code by email to reset your password.');
}
function showGate(msg){$('#gate').classList.add('show');$('#app').style.display='none';if(msg)$('#gateMsg').textContent=msg;}
function hideGate(){$('#gate').classList.remove('show');$('#app').style.display='flex';}
async function fnCall(action,payload){
  try{
    const r=await fetch(PANEL_URL+'/functions/v1/acesso',{method:'POST',headers:{'Content-Type':'application/json','apikey':PANEL_KEY,'Authorization':'Bearer '+PANEL_KEY},body:JSON.stringify({action,...payload})});
    return await r.json();
  }catch(e){return {ok:false,error:'Falha de conexão.'};}
}
async function doLogin(){
  const email=($('#liEmail').value||'').trim().toLowerCase(),senha=$('#liSenha').value||'';
  if(!email||!senha){showGate('Enter email and password.');return;}
  _senha=senha;showGate('Signing in…');
  try{sessionStorage.setItem('__pw',senha);}catch(e){}
  const {error}=await SB.auth.signInWithPassword({email,password:senha});
  if(error){_senha='';showGate('Invalid email or password.');}
}
async function sendCode(){
  const email=($('#caEmail').value||'').trim().toLowerCase();
  if(!email){showGate('Enter your email.');return;}
  const b=$('#caSendBtn');b.disabled=true;b.textContent='Sending…';
  const j=await fnCall('codigo',{email});
  b.disabled=false;b.textContent='Resend code';
  if(j&&j.ok){$('#caStep2').classList.remove('hide');showGate('Code sent to '+email+'. Check your email (and spam).');}
  else showGate((j&&j.error)||'Could not send the code.');
}
async function setPassword(){
  const email=($('#caEmail').value||'').trim().toLowerCase(),codigo=($('#caCode').value||'').trim(),senha=$('#caSenha').value||'';
  if(!codigo||senha.length<6){showGate('Enter the code and a password of at least 6 characters.');return;}
  const j=await fnCall('definir',{email,codigo,senha});
  if(j&&j.ok){_senha=senha;try{sessionStorage.setItem('__pw',senha);}catch(e){}showGate('Senha definida! Signing in…');const {error}=await SB.auth.signInWithPassword({email,password:senha});if(error){_senha='';showGate('Password created, but sign-in failed — try signing in manually.');}}
  else showGate((j&&j.error)||'Invalid or expired code.');
}
async function signOut(){try{sessionStorage.removeItem('__pw');}catch(e){}try{await SB.auth.signOut();}catch(e){}try{await SBPO.auth.signOut();}catch(e){}_senha='';booted=false;location.reload();}

async function boot(){
  try{
    const {data}=await SB.auth.getSession();
    if(data&&data.session&&data.session.user){onSignedIn(data.session.user);return;}
  }catch(e){}
  showGate();
  SB.auth.onAuthStateChange((ev,sess)=>{
    if(sess&&sess.user){if(!booted)setTimeout(()=>onSignedIn(sess.user),0);}
    else if(ev==='SIGNED_OUT'){booted=false;_senha='';showGate('Session ended. Sign in again.');}
  });
}
async function onSignedIn(user){
  if(booted)return;booted=true;currentUser=user;
  isManager=MANAGER_EMAILS.map(e=>e.toLowerCase()).includes((user.email||'').toLowerCase());
  hideGate();
  $('#acctEmail').textContent=user.email||'';
  $('#acctAv').textContent=(user.email||'?')[0].toUpperCase();
  $('#acctAv').style.background=avColor(user.email);
  try{ await ssoPO(user.email); }catch(e){ console.warn('PO SSO:',e); window.__poErr=(e&&e.message)||String(e); }
  try{ await loadAll(); }catch(e){ console.error('load:',e); }
  // diagnostic line in sidebar footer
  try{ const d=$('#poDiag'); if(d){ d.textContent = PO_ACCESS ? ('Budget: '+PAPEL) : ('Budget off — '+(window.__poErr||'no PO role')); d.style.color = PO_ACCESS ? '#7e828e' : '#ef7f88'; } }catch(e){}
  buildNav(); const nav=currentNav(); go((nav.work.concat(nav.budget))[0]||'dash');
}

/* SSO silencioso com o PO (mesma senha) — acesso derivado do papel real */
async function ssoPO(email){
  const em=(email||'').toLowerCase();
  window.__poErr='';
  let pw=_senha; if(!pw){ try{ pw=sessionStorage.getItem('__pw')||''; }catch(e){} }
  let {data:sPO}=await SBPO.auth.getSession();
  if(!(sPO&&sPO.session)){
    if(!pw){ window.__poErr='sign out and sign in typing your password'; PAPEL=''; PO_ACCESS=false; return; }
    const {error}=await SBPO.auth.signInWithPassword({email:em,password:pw});
    if(error){
      // senha divergente entre painel e PO — sincroniza via função unify e tenta de novo
      try{
        const r=await fetch(PO_URL+'/functions/v1/unify',{method:'POST',headers:{'Content-Type':'application/json','apikey':PO_KEY,'Authorization':'Bearer '+PO_KEY},body:JSON.stringify({email:em,password:pw})});
        const j=await r.json();
        if(j&&j.ok){ const {error:e2}=await SBPO.auth.signInWithPassword({email:em,password:pw}); if(e2){ window.__poErr='after unify: '+e2.message; PAPEL='';PO_ACCESS=false;_senha='';return; } }
        else { window.__poErr='unify: '+((j&&j.error)||'failed'); PAPEL='';PO_ACCESS=false;_senha='';return; }
      }catch(ue){ window.__poErr=error.message; PAPEL='';PO_ACCESS=false;_senha='';return; }
    }
    ({data:sPO}=await SBPO.auth.getSession());
  }
  _senha='';
  try{
    const {data:p,error}=await SBPO.rpc('papel_atual');
    if(error){ window.__poErr='papel_atual: '+error.message; }
    PAPEL=p||'';
    PO_ACCESS=!!PAPEL && PAPEL!=='pendente';
    if(!PAPEL && !window.__poErr) window.__poErr='no role for '+em+' in PO';
  }catch(e){ PAPEL=''; PO_ACCESS=false; window.__poErr=(e&&e.message)||'papel_atual failed'; }
  if(PAPEL==='agencia'){ try{ const {data:a}=await SBPO.rpc('agencia_atual'); MINHA_AGENCIA=a||''; }catch(e){} }
}

/* ============================================================
   DATA LOADING (leitura real dos dois bancos)
   ============================================================ */
async function loadAll(){
  // painel de projetos
  try{
    const [pr,cf]=await Promise.all([
      SB.from('projetos').select('id,data'),
      SB.from('config').select('data').eq('id','app').maybeSingle()
    ]);
    DATA.projetos=(pr.data||[]).map(r=>r.data).filter(Boolean);
    DATA.projetos.forEach(p=>{ p.tasks=(p.tasks||p.atividades||p.activities||p.checklist||[]).map(t=>({...t, n:t.n||t.nome||t.titulo||t.title||'', done:!!t.done, fim:t.fim||t.due||'', status:t.status||(t.done?'concluido':'no_prazo'), pct:t.pct!=null?t.pct:(t.done?100:0), obs:t.obs||t.nota||'', subs:t.subs||t.subitens||[]})); p.logs=(p.logs||p.updates||[]).map(l=>({...l, txt:l.txt||l.texto||l.mensagem||l.msg||'', autor:l.autor||l.author||l.by||'', t:l.t||l.data||l.date||''})); p.etapa=autoEtapa(p);p.status=autoStatus(p);});
    const s=(cf&&cf.data&&cf.data.data)?cf.data.data:{};
    TEAM=(s.team||[]).map(p=>typeof p==='string'?{nome:p,empresa:''}:p);
  }catch(e){console.error('projetos painel:',e);}
  // menções para mim (tabela real do painel)
  try{
    const me=((currentUser&&currentUser.email)||'').toLowerCase();
    const {data:mc}=await SB.from('mencoes').select('projeto_nome,autor,mensagem,criado_em').eq('destinatario_email',me).order('criado_em',{ascending:false}).limit(50);
    DATA.mencoes=mc||[];
  }catch(e){ DATA.mencoes=[]; }
  if(!PO_ACCESS)return;
  // PO / orçamento
  try{
    const [orc,prj,pos,tet,rat,nt,pes,fee]=await Promise.all([
      SBPO.from('orcamentos').select('id,nome,valor_total,valor_liberado,product_category,periodo_inicio,periodo_fim'),
      SBPO.from('projetos').select('id,nome,agencia,orcamento_id,product_category,activity,projeto_tag,rateio,aprovacao_status'),
      SBPO.from('pos').select('id,projeto_id,competencia,agencia,valor,descricao,numero_po,status,solicitado_em'),
      SBPO.from('tetos').select('projeto_id,competencia,teto'),
      SBPO.from('rateio_alocacao').select('projeto_id,competencia,valor'),
      SBPO.from('notificacoes').select('id,lida,criada_em').eq('lida',false).limit(50),
      SBPO.rpc('listar_pessoas'),
      SBPO.from('fee_rateio').select('agencia,tipo,categoria,percentual,cc,account,descricao')
    ]);
    DATA.orcamentos=orc.data||[]; DATA.poProjetos=prj.data||[]; DATA.pos=pos.data||[];
    DATA.tetos=tet.data||[]; DATA.rateio=rat.data||[]; DATA.notif=nt.data||[];
    DATA.pessoas=pes.data||[]; DATA.fee=fee.data||[];
  }catch(e){console.error('PO load:',e);}
}

  const col=meta.mod==='budget'?'#e20613':'#ff5436';
  $('#scrTitle').textContent=meta.t; $('#scrSub').textContent=meta.s; $('#barcol').style.background=col;

  if(['dash','board','list','timeline'].includes(screen)){
    $('#ctaBox').innerHTML='<button class="btn-acc" onclick="openProjNew()">+ New project</button>';
  } else if(screen==='mytasks'){

/* charts */
let _charts=[];
function destroyCharts(){_charts.forEach(c=>{try{c.destroy();}catch(e){}});_charts=[];}
function buildDashCharts(){
  const el=document.getElementById('chartStatus'); if(!el||!window.Chart)return;
  const list=DATA.projetos;
  const defs=[['On track','no_prazo','#16a06a'],['At risk','atencao','#d68a04'],['Late','atrasado','#e0392b'],['Blocked','bloqueado','#6d4bd1'],['Completed','concluido','#5d6068']];
  const vals=defs.map(d=>list.filter(p=>p.status===d[1]).length);
  _charts.push(new Chart(el,{type:'doughnut',data:{labels:defs.map(d=>d[0]),datasets:[{data:vals,backgroundColor:defs.map(d=>d[2]),borderWidth:2,borderColor:'#fff'}]},options:{cutout:'62%',plugins:{legend:{position:'right',labels:{font:{family:'DM Sans',size:12},boxWidth:12,padding:10}}}}}));
}
function buildCampanhaChart(){
  const el=document.getElementById('chartCamp'); if(!el||!window.Chart)return;
  let list=DATA.poProjetos.filter(p=>p.aprovacao_status==='APROVADO');
  if(PAPEL==='agencia'&&MINHA_AGENCIA) list=list.filter(p=>p.agencia===MINHA_AGENCIA);
  const tetoBy={},consBy={};
  DATA.tetos.forEach(t=>tetoBy[t.projeto_id]=(tetoBy[t.projeto_id]||0)+(+t.teto||0));
  DATA.rateio.forEach(r=>tetoBy[r.projeto_id]=(tetoBy[r.projeto_id]||0)+(+r.valor||0));
  DATA.pos.forEach(po=>{if(['FATURADA','VALIDADA','CONCLUIDA','APROVADA','PO_GERADA','ATUALIZAR_INFO'].includes(po.status))consBy[po.projeto_id]=(consBy[po.projeto_id]||0)+(+po.valor||0);});
  const top=list.map(p=>({n:p.nome,teto:tetoBy[p.id]||0,cons:consBy[p.id]||0})).sort((a,b)=>b.teto-a.teto).slice(0,8);
  _charts.push(new Chart(el,{type:'bar',data:{labels:top.map(t=>t.n.length>22?t.n.slice(0,20)+'…':t.n),datasets:[{label:'Budgeted',data:top.map(t=>t.teto),backgroundColor:'#e3e1da',borderRadius:5},{label:'Consumed',data:top.map(t=>t.cons),backgroundColor:'#e20613',borderRadius:5}]},options:{indexAxis:'y',plugins:{legend:{labels:{font:{family:'DM Sans',size:11},boxWidth:12}}},scales:{x:{ticks:{callback:v=>'R$ '+(v/1000)+'k',font:{family:'JetBrains Mono',size:10}}},y:{ticks:{font:{family:'DM Sans',size:11}}}}}}));
}

function renderDash(){
  const list=visProjs(), active=list.filter(p=>p.status!=='concluido');

    no_prazo:list.filter(p=>p.status==='no_prazo').length,
    atencao:list.filter(p=>p.status==='atencao').length,
    atrasado:list.filter(p=>p.status==='atrasado').length,
    bloqueado:list.filter(p=>p.status==='bloqueado').length,
    concl:list.filter(p=>p.status==='concluido').length};
  const kpi=(l,n,col,m)=>`<div class="kpi"><span class="bar" style="background:${col}"></span><div class="lbl">${l}</div><div class="num" style="color:${col}">${n}</div><div class="meta">${m}</div></div>`;
  const need=list.filter(p=>['atrasado','bloqueado','atencao'].includes(p.status)).sort((a,b)=>(daysTo(a.prazo)??99)-(daysTo(b.prazo)??99));
  const up=list.filter(p=>p.status!=='concluido'&&p.prazo).sort((a,b)=>(daysTo(a.prazo)??999)-(daysTo(b.prazo)??999)).slice(0,6);
  const pc={atrasado:'var(--red)',bloqueado:'var(--violet)',atencao:'var(--amber)',no_prazo:'var(--green)',concluido:'var(--slate)'};
  return `
  <div class="kpis">
    ${kpi('Active',c.total,'#14161c','in progress')}
    ${kpi('On track',c.no_prazo,'var(--green)','on track')}
    ${kpi('At risk',c.atencao,'var(--amber)','monitor')}
    ${kpi('Late',c.atrasado,'var(--red)','act now')}
    ${kpi('Blocked',c.bloqueado,'var(--violet)','unblock')}
    ${kpi('Completed',c.concl,'var(--slate)','this period')}
  </div>
  <div style="display:grid;grid-template-columns:1.3fr 1fr;gap:18px;margin-bottom:18px">
    <div class="panel"><div class="panel-h"><h3>⚡ Next actions</h3><span class="tag">${need.length} item(s)</span></div>
      <div class="panel-b">${need.length?need.map(p=>{const st=statusOf(p.status);const di=deadlineInfo(p);const lu=latestLog(p);

const CONS=['FATURADA','VALIDADA','CONCLUIDA'], COMP=['APROVADA','PO_GERADA','ATUALIZAR_INFO'], PEND=['SOLICITADA','EM_APROVACAO'];
function renderCampanhas(){
  let list=DATA.poProjetos.slice();

  DATA.tetos.forEach(t=>{tetoBy[t.projeto_id]=(tetoBy[t.projeto_id]||0)+(+t.teto||0);});
  DATA.rateio.forEach(r=>{tetoBy[r.projeto_id]=(tetoBy[r.projeto_id]||0)+(+r.valor||0);});
  DATA.pos.forEach(po=>{const v=+po.valor||0;if(CONS.includes(po.status))consBy[po.projeto_id]=(consBy[po.projeto_id]||0)+v;else if(COMP.includes(po.status))compBy[po.projeto_id]=(compBy[po.projeto_id]||0)+v;else if(PEND.includes(po.status))pendBy[po.projeto_id]=(pendBy[po.projeto_id]||0)+v;});
  const aprov=list.filter(p=>p.aprovacao_status==='APROVADO');
  let orcado=0,consumido=0; aprov.forEach(p=>{orcado+=tetoBy[p.id]||0;consumido+=(consBy[p.id]||0)+(compBy[p.id]||0);});
  const pendCount=list.filter(p=>p.aprovacao_status==='PENDENTE').length;
  const stat=(l,v,col)=>`<div style="background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px 16px;box-shadow:0 1px 2px rgba(20,22,28,.05)"><div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--txt-2);font-weight:700">${l}</div><div class="mono" style="font-size:19px;font-weight:700;margin-top:7px;color:${col}">${v}</div></div>`;
  const AP={APROVADO:{t:'Approved',c:'#1f8a4c'},PENDENTE:{t:'Pending',c:'#cf8a16'},REJEITADO:{t:'Rejected',c:'#bf0008'}};
  const rows=list.sort((a,b)=>(a.nome||'').localeCompare(b.nome||'')).map(p=>{
    const teto=tetoBy[p.id]||0, cons=consBy[p.id]||0, comp=compBy[p.id]||0, pend=pendBy[p.id]||0;
    const saldo=teto-cons-comp-pend;
    const pC=teto?Math.min(100,cons/teto*100):0, pP=teto?Math.min(100-pC,(comp+pend)/teto*100):0;
    const ap=AP[p.aprovacao_status]||AP.PENDENTE;
    const nMes=new Set([...DATA.tetos.filter(t=>t.projeto_id===p.id).map(t=>String(t.competencia).slice(0,7)),...DATA.rateio.filter(r=>r.projeto_id===p.id).map(r=>String(r.competencia).slice(0,7))]).size;
    return `<div onclick="openCampDetail('${esc(p.id)}')" style="display:grid;grid-template-columns:1.6fr .9fr .9fr .9fr 1.3fr .9fr .9fr;gap:10px;padding:13px 17px;border-bottom:1px solid #f0eee8;align-items:center;font-size:13px;cursor:pointer" onmouseover="this.style.background='#faf9f5'" onmouseout="this.style.background=''">
      <span style="min-width:0"><span style="font-weight:600;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.nome)}</span><span style="font-size:11px;color:var(--txt-3)">${nMes?nMes+' month(s)':''}${p.rateio?' · rateio':''}</span></span>
      <span style="color:var(--txt-2)">${esc(p.agencia||'—')}</span>
      <span style="color:var(--txt-2);font-size:12px">${esc(p.product_category||'—')}</span>
      <span class="mono" style="text-align:right;font-size:12.5px">${BRL(teto)}</span>
      <span style="display:flex;align-items:center;gap:9px;min-width:0"><span style="flex:1;height:9px;background:#f0eee8;border-radius:5px;overflow:hidden;display:flex;min-width:40px"><span style="width:${pC}%;background:#1f8a4c"></span><span style="width:${pP}%;background:#cf8a16"></span></span><span class="mono" style="font-size:11px;color:var(--txt-2);flex-shrink:0">${BRL(cons)}</span></span>
      <span class="mono" style="text-align:right;font-size:12.5px;color:${saldo<0?'var(--po)':'var(--txt)'}">${BRL(saldo)}</span>
      <span><span style="font-size:11px;font-weight:600;border:1.5px solid ${ap.c};color:${ap.c};border-radius:20px;padding:2px 10px;white-space:nowrap">${ap.t}</span></span>
    </div>`;
  }).join('')||'<div class="empty">No campaigns for your access.</div>';
  return `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px">
      ${stat('Campaigns',String(list.length),'#14161c')}
      ${stat('Budgeted (appr.)',BRL(orcado),'#14161c')}
      ${stat('Consumed',BRL(consumido),'var(--po)')}
      ${stat('Pending',String(pendCount),'#cf8a16')}
    </div>
    <div style="background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden;box-shadow:0 1px 2px rgba(20,22,28,.05)">
      <div style="display:grid;grid-template-columns:1.6fr .9fr .9fr .9fr 1.3fr .9fr .9fr;gap:10px;padding:11px 17px;background:#fbfaf7;border-bottom:1px solid var(--line);font-size:10.5px;font-weight:700;color:var(--txt-3);text-transform:uppercase;letter-spacing:.05em">

/* Detalhe da campanha — cap × PO por mês (mostra de qual mês cada PO consome) */
function openCampDetail(pid){
  const p=DATA.poProjetos.find(x=>x.id===pid); if(!p)return;
  const capByM={};
  DATA.tetos.filter(t=>t.projeto_id===pid).forEach(t=>{const m=String(t.competencia).slice(0,7);capByM[m]=(capByM[m]||0)+(+t.teto||0);});
  DATA.rateio.filter(r=>r.projeto_id===pid).forEach(r=>{const m=String(r.competencia).slice(0,7);capByM[m]=(capByM[m]||0)+(+r.valor||0);});
  const posByM={}; DATA.pos.filter(po=>po.projeto_id===pid).forEach(po=>{const m=String(po.competencia).slice(0,7);(posByM[m]=posByM[m]||[]).push(po);});
  const months=[...new Set([...Object.keys(capByM),...Object.keys(posByM)])].sort();
  const blocks=months.map(m=>{
    const cap=capByM[m]||0; const list=posByM[m]||[];
    const cons=list.filter(po=>!['REJEITADA','CANCELADA'].includes(po.status)).reduce((s,po)=>s+(+po.valor||0),0);
    const saldo=cap-cons; const pct=cap?Math.min(100,cons/cap*100):0;
    return `<div style="border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><b style="font-family:Sora,sans-serif;font-size:13.5px">${fmtMes(m+'-01')}</b><span class="mono" style="font-size:12px;color:${saldo<0?'var(--po)':'var(--txt-2)'}">balance ${BRL(saldo)} · cap ${BRL(cap)}</span></div>
      <div style="height:8px;border-radius:5px;background:#f0eee8;overflow:hidden;margin-bottom:10px"><span style="display:block;height:100%;width:${pct}%;background:#1f8a4c"></span></div>
      ${list.length?list.map(po=>{const s=PO_STATUS[po.status]||{t:po.status,c:'s-slate'};return `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px dashed var(--line)"><span class="badge s-blue" style="flex-shrink:0"><span class="d"></span>${fmtMes(po.competencia)}</span><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:12.5px">${esc(po.descricao||'—')}</div><div style="font-size:11px;color:var(--txt-3)">${esc(po.agencia||'')} · ${esc(po.numero_po||'no number')}</div></div><span class="mono" style="font-weight:700;font-size:12.5px">${BRL(po.valor)}</span><span class="badge ${s.c}"><span class="d"></span>${s.t}</span></div>`;}).join(''):'<div style="font-size:12px;color:var(--txt-3)">No PO this month.</div>'}
    </div>`;
  }).join('')||'<div class="empty">No months registered.</div>';
  $('#modalMount').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:640px">
    <div class="modal-h"><h3>${esc(p.nome)}</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-b"><div style="font-size:12.5px;color:var(--txt-3);margin-bottom:14px">${esc(p.agencia||'')} · ${esc(p.product_category||'')}${p.rateio?' · rateio':''} — month-by-month consumption</div>${blocks}</div>
    <div class="modal-f"><span></span><button class="btn-ghost" onclick="closeModal()">Close</button></div>
  </div></div>`;
}

function renderPOs(){
  let pos=DATA.pos.slice();
  if(PAPEL==='agencia'&&MINHA_AGENCIA) pos=pos.filter(p=>p.agencia===MINHA_AGENCIA);

      <span style="font-size:12px;color:var(--txt-2)">${fmtMes(po.competencia)}</span>
      <span class="mono" style="text-align:right;font-size:12.5px">${BRL(po.valor)}</span>
      <span class="mono" style="font-size:12px;color:var(--txt-3)">${esc(po.numero_po||'—')}</span>

      <span style="display:flex;gap:6px;flex-wrap:wrap">${(canAprova&&pend)?`<button onclick="aprovarPO('${esc(po.id)}')" style="padding:6px 12px;border-radius:8px;border:none;background:var(--po);color:#fff;font-weight:700;font-size:11.5px;cursor:pointer">Approve</button><button onclick="rejeitarPO('${esc(po.id)}')" style="padding:6px 12px;border-radius:8px;border:1px solid var(--line-2);background:#fff;color:var(--txt-2);font-weight:700;font-size:11.5px;cursor:pointer">Reject</button>`:(((isManager||PAPEL==='admin'))?`<button class="chip-btn" onclick="realocarPO('${esc(po.id)}')">Reallocate month</button>`:'<span style="font-size:11.5px;color:var(--txt-3)">—</span>')}</span>
    </div>`;
  }).join('')||'<div class="empty">No POs found for your access.</div>';
  return filt+`<div style="background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden;box-shadow:0 1px 2px rgba(20,22,28,.05)">${head}<div id="poBody">${body}</div></div>
    <div style="font-size:11.5px;color:var(--txt-3);margin-top:10px">Lifecycle: request → approve → issue nº → invoice (NF+evidence) → validate. Approve/Reject is live for admin and marketing.</div>`;
}

function pmToggleOpen(tid){ const t=atv(tid); if(t){ t._open=!t._open; renderProjModal(); } }
async function saveProj(){
  if(!EDIT)return;
  if(!(EDIT.nome||'').trim()){ toast('Give the project a name.'); return; }
  const clean=JSON.parse(JSON.stringify(EDIT)); delete clean._new;
  clean.etapa=autoEtapa(clean); clean.status=autoStatus(clean);
  try{
    const {error}=await SB.from('projetos').upsert({id:clean.id,data:clean});
    if(error)throw error;
    const i=DATA.projetos.findIndex(p=>p.id===clean.id);
    if(i>=0)DATA.projetos[i]=clean; else DATA.projetos.push(clean);
    toast('Project saved ✓'); closeModal(); go(SCREEN);
  }catch(e){ toast('Error saving: '+(e.message||e)); }
}
async function delProj(id){
  if(!confirm('Delete this project? This action cannot be undone.'))return;
  try{ await SB.from('projetos').delete().eq('id',id); DATA.projetos=DATA.projetos.filter(p=>p.id!==id); toast('Project deleted'); closeModal(); go(SCREEN); }
  catch(e){ toast('Error: '+(e.message||e)); }
}

let REQ=null; // {projeto_id, meses:[{competencia,teto}], competencia, valor, descricao}
function poNome(id){ const p=DATA.poProjetos.find(x=>x.id===id); return p?p.nome:'—'; }
async function mesesDoProjeto(pid){
  const p=DATA.poProjetos.find(x=>x.id===pid);
  try{
    if(p&&p.rateio){
      const {data}=await SBPO.from('rateio_alocacao').select('competencia,valor').eq('projeto_id',pid);
      const byM={}; (data||[]).forEach(a=>{const m=String(a.competencia).slice(0,7);byM[m]=(byM[m]||0)+(+a.valor||0);});
      return Object.keys(byM).sort().map(m=>({competencia:m+'-01',teto:byM[m]}));
    }else{
      const {data}=await SBPO.from('tetos').select('competencia,teto').eq('projeto_id',pid).order('competencia');
      return (data||[]).map(t=>({competencia:String(t.competencia).slice(0,10),teto:+t.teto}));
    }
  }catch(e){ return []; }
}
function consumoMes(pid,comp){
  return DATA.pos.filter(po=>po.projeto_id===pid&&String(po.competencia).slice(0,7)===String(comp).slice(0,7)&&!['REJEITADA','CANCELADA'].includes(po.status)).reduce((s,po)=>s+(+po.valor||0),0);
}
function openReqPO(){
  let projs=DATA.poProjetos.filter(p=>p.aprovacao_status==='APROVADO');
  if(PAPEL==='agencia'&&MINHA_AGENCIA) projs=projs.filter(p=>p.agencia===MINHA_AGENCIA);
  REQ={projeto_id:projs[0]?projs[0].id:'',meses:[],competencia:'',valor:'',descricao:''};
  renderReqPO(projs); if(REQ.projeto_id) reqLoadMeses();
}
async function reqLoadMeses(){
  REQ.meses=await mesesDoProjeto(REQ.projeto_id);
  REQ.competencia=REQ.meses[0]?REQ.meses[0].competencia:'';
  let projs=DATA.poProjetos.filter(p=>p.aprovacao_status==='APROVADO'); if(PAPEL==='agencia'&&MINHA_AGENCIA)projs=projs.filter(p=>p.agencia===MINHA_AGENCIA);
  renderReqPO(projs);
}
function reqSet(k,v){ if(!REQ)return; REQ[k]=v; if(k==='projeto_id'){ reqLoadMeses(); } else { let projs=DATA.poProjetos.filter(p=>p.aprovacao_status==='APROVADO'); if(PAPEL==='agencia'&&MINHA_AGENCIA)projs=projs.filter(p=>p.agencia===MINHA_AGENCIA); renderReqPO(projs); } }
function renderReqPO(projs){
  if(!REQ)return;
  const mSel=REQ.meses.find(m=>m.competencia===REQ.competencia);
  const teto=mSel?mSel.teto:0, cons=REQ.competencia?consumoMes(REQ.projeto_id,REQ.competencia):0, saldo=teto-cons;
  const val=+REQ.valor||0, estoura=val>saldo+0.001;
  $('#modalMount').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:560px">
    <div class="modal-h"><h3>Request PO</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-b">
      <div class="field"><label>Campaign</label><select onchange="reqSet('projeto_id',this.value)">${projs.map(p=>`<option value="${p.id}" ${REQ.projeto_id===p.id?'selected':''}>${esc(p.nome)}${p.agencia?' · '+esc(p.agencia):''}</option>`).join('')||'<option value="">—</option>'}</select></div>
      <div class="field"><label>Month to allocate (as opened in the project)</label>
        <select onchange="reqSet('competencia',this.value)">${REQ.meses.length?REQ.meses.map(m=>`<option value="${m.competencia}" ${REQ.competencia===m.competencia?'selected':''}>${fmtMes(m.competencia)} — cap ${BRL(m.teto)}</option>`).join(''):'<option value="">Project has no months registered</option>'}</select>
        ${REQ.competencia?`<div style="font-size:11.5px;color:${estoura?'var(--red)':'var(--txt-3)'};margin-top:5px">Month balance: <b class="mono">${BRL(saldo)}</b> (cap ${BRL(teto)} − consumed ${BRL(cons)})</div>`:''}</div>
      <div class="field"><label>Value (R$)</label><input type="number" min="0" step="100" value="${esc(REQ.valor)}" onchange="reqSet('valor',this.value)" placeholder="0,00"></div>
      <div class="field"><label>Description</label><input value="${esc(REQ.descricao)}" onchange="reqSet('descricao',this.value)" placeholder="e.g. Video production, paid media…"></div>
      ${estoura?'<div class="banner" style="background:var(--red-bg);border-color:#f0b8b2;color:#b32418">O valor excede o balance do mês selecionado. Escolha outro mês ou reduza o valor.</div>':''}
    </div>
    <div class="modal-f"><span></span><div style="display:flex;gap:10px"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-acc" onclick="submitReqPO()">Submit request</button></div></div>
  </div></div>`;
}
async function submitReqPO(){
  if(!REQ)return;
  if(!REQ.projeto_id){ toast('Choose the campaign.'); return; }
  if(!REQ.competencia){ toast('Choose the allocation month.'); return; }
  const val=+REQ.valor||0; if(val<=0){ toast('Enter a value.'); return; }
  const ag=(PAPEL==='agencia'&&MINHA_AGENCIA)?MINHA_AGENCIA:(DATA.poProjetos.find(p=>p.id===REQ.projeto_id)||{}).agencia||'';
  try{
    const {error}=await SBPO.rpc('solicitar_po',{p_projeto:REQ.projeto_id,p_competencia:REQ.competencia,p_agencia:ag,p_valor:val,p_descricao:REQ.descricao||''});
    if(error)throw error;
    toast('PO requested for '+fmtMes(REQ.competencia)+' ✓'); closeModal();
    await reloadPO(); go('pos');
  }catch(e){ toast('Error: '+(e.message||e)); }
}
async function reloadPO(){
  try{
    const {data}=await SBPO.from('pos').select('id,projeto_id,competencia,agencia,valor,descricao,numero_po,status,solicitado_em');
    DATA.pos=data||[];
  }catch(e){}
}
/* admin realoca o mês de uma PO */
async function realocarPO(poId){
  if(!isManager&&PAPEL!=='admin'){ toast('Only admin can reallocate.'); return; }
  const po=DATA.pos.find(p=>p.id===poId); if(!po)return;
  const meses=await mesesDoProjeto(po.projeto_id);
  const opts=meses.map(m=>fmtMes(m.competencia)).join(', ');
  const novo=prompt('Reallocate PO to which month? Project months: '+opts+'\n\nEnter in YYYY-MM format (e.g. 2026-08):', String(po.competencia).slice(0,7));
  if(!novo)return;
  const comp=/^\d{4}-\d{2}$/.test(novo)?novo+'-01':novo;
  try{
    const {error}=await SBPO.from('pos').update({competencia:comp}).eq('id',poId);
    if(error)throw error;
    po.competencia=comp; toast('PO reallocated to '+fmtMes(comp)+' ✓'); go('pos');
  }catch(e){ toast('Error reallocating: '+(e.message||e)); }
}

    </div>`;
  }).join('');
  return `<div style="background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden;box-shadow:0 1px 2px rgba(20,22,28,.05)">
    <div style="display:flex;border-bottom:1px solid var(--line);background:#fbfaf7"><div style="width:230px;flex-shrink:0;padding:11px 16px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--txt-3);border-right:1px solid var(--line)">Project</div><div style="flex:1;display:flex">${wkHead}</div></div>
    ${rows}</div>

  const cat=orc?(orc.product_category||orc.nome||''):'';
  const total=CAMP.rows.reduce((s,r)=>s+(+r.valor||0),0);
  const ags=agencyOpts(); const tipos=rateioTipos();
  $('#modalMount').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:600px">
    <div class="modal-h" style="align-items:flex-start"><span style="width:7px;height:30px;border-radius:4px;background:var(--po);flex-shrink:0;margin-right:2px"></span><div style="flex:1"><h3>New campaign</h3><div style="font-size:11px;color:var(--txt-3);margin-top:1px">Activity → rateio → manual monthly distribution over the period</div></div><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-b">
      <div class="field full"><label>Campaign name</label><input value="${esc(CAMP.nome)}" onchange="CAMP.nome=this.value" placeholder="e.g. Mini LED Push" style="width:100%;padding:10px 12px;border:1px solid var(--line-2);border-radius:9px;background:var(--paper-2);font:inherit;font-size:13.5px"></div>
      <div class="fgrid" style="margin-top:14px">
        <div class="field"><label>Activity</label><select onchange="campSet('activity',this.value)">${ACT_OPTS.map(a=>`<option ${CAMP.activity===a?'selected':''}>${a}</option>`).join('')}</select></div>
        <div class="field"><label>Agency</label><select onchange="CAMP.agencia=this.value">${ags.map(a=>`<option ${CAMP.agencia===a?'selected':''}>${esc(a)}</option>`).join('')}${ags.length?'':'<option value="">—</option>'}</select></div>
      </div>
      <label style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--paper-2);cursor:pointer;margin-bottom:14px"><input type="checkbox" ${CAMP.rateio?'checked':''} onchange="campSet('rateio',this.checked)" style="width:16px;height:16px;accent-color:var(--po);margin-top:1px"><span style="font-size:12.5px">This is a <b>shared rateio</b> — single invoice, admin splits it across categories by fixed percentages</span></label>
      ${CAMP.rateio?`<div class="field full"><label>Which rateio?</label><select onchange="campSet('qual',this.value)">${tipos.length?tipos.map(t=>`<option ${CAMP.qual===t?'selected':''}>${esc(t)}</option>`).join(''):'<option value="">— no fee split configured —</option>'}</select></div>`:''}
      <div class="field full"><label>Category <span style="font-weight:600;color:var(--txt-3)">(defines which budget funds it)</span></label><select onchange="campSet('orcamento_id',this.value)">${orcs.map(o=>`<option value="${o.id}" ${CAMP.orcamento_id===o.id?'selected':''}>${esc(o.nome||o.product_category)}</option>`).join('')||'<option value="">— no budget —</option>'}</select></div>
      <div style="border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:6px">
        <div style="padding:10px 14px;background:#fbfaf7;border-bottom:1px solid var(--line);font-size:11px;font-weight:700;color:var(--txt-3);text-transform:uppercase;letter-spacing:.05em">Budget distribution by month — manual</div>
        <div style="padding:10px 14px;display:flex;flex-direction:column;gap:8px">
          ${CAMP.rows.map(r=>`<div style="display:flex;align-items:center;gap:9px"><input type="month" value="${esc(r.mes)}" onchange="campRowSet('${r.id}','mes',this.value)" style="padding:8px 10px;border:1px solid var(--line-2);border-radius:8px;background:#fff;font:inherit;font-size:12.5px"><input type="number" min="0" step="100" value="${esc(r.valor)}" onchange="campRowSet('${r.id}','valor',this.value)" placeholder="R$ 0" style="flex:1;padding:8px 10px;border:1px solid var(--line-2);border-radius:8px;background:#fff;font:inherit;font-size:12.5px;text-align:right" class="mono"><button class="chip-btn" onclick="campDelRow('${r.id}')">✕</button></div>`).join('')}
          <button class="btn-ghost" onclick="campAddRow()" style="align-self:flex-start;margin-top:2px">+ Add month</button>
        </div>
        <div style="padding:11px 14px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between"><b style="font-family:Sora,sans-serif;font-size:13px">Total caps (sum of months)</b><span class="mono" style="font-size:15px;font-weight:800">${BRL(total)}</span></div>
      </div>
    </div>
    <div class="modal-f"><span></span><div style="display:flex;gap:10px"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-acc" style="background:var(--po)" onclick="submitCamp()">Create campaign</button></div></div>
  </div></div>`;
}
async function submitCamp(){
  if(!CAMP)return;
  if(!CAMP.nome.trim()){ toast('Give the campaign a name.'); return; }
  if(!CAMP.orcamento_id){ toast('Choose a budget.'); return; }
  const rows=CAMP.rows.filter(r=>r.mes&&(+r.valor||0)>0);
  if(!rows.length){ toast('Add at least one month with a value.'); return; }
  const orc=(DATA.orcamentos||[]).find(o=>o.id===CAMP.orcamento_id); const cat=orc?(orc.product_category||orc.nome||''):'';
  try{
    let cc='',account='',account_desc='';
    try{ const {data:cls}=await SBPO.rpc('classificar',{p_d:cat,p_e:CAMP.activity||'',p_f:''}); const c=(cls&&cls[0])||{}; cc=c.cc||''; account=c.account||''; account_desc=c.descricao||''; }catch(e){}
    const campos={nome:CAMP.nome.trim(),agencia:CAMP.agencia||null,orcamento_id:CAMP.orcamento_id,product_category:cat,activity:CAMP.activity||null,cc,account,account_desc,rateio:!!CAMP.rateio,criado_por:'portal'};
    const {data:proj,error}=await SBPO.from('projetos').insert(campos).select().single();
    if(error)throw error;
    const pid=proj.id;
    if(CAMP.rateio){
      // split each month across the fee-split categories by fixed percentages (rateio)
      let splits=(DATA.fee||[]).filter(f=>f.tipo===CAMP.qual&&(!CAMP.agencia||!f.agencia||f.agencia===CAMP.agencia));
      if(!splits.length) splits=[{categoria:cat,percentual:1}];
      const alloc=[];
      rows.forEach(r=>{ const v=+r.valor||0; splits.forEach(s=>{ alloc.push({projeto_id:pid,categoria:s.categoria||cat,competencia:r.mes+'-01',valor:Math.round(v*(+s.percentual||0))}); }); });
      const {error:e2}=await SBPO.from('rateio_alocacao').insert(alloc); if(e2)throw e2;
    }else{
      const tetos=rows.map(r=>({projeto_id:pid,competencia:r.mes+'-01',teto:Math.round(+r.valor),definido_por:'portal'}));
      const {error:e2}=await SBPO.from('tetos').upsert(tetos,{onConflict:'projeto_id,competencia'}); if(e2)throw e2;
    }
    toast('Campaign created ✓'); closeModal(); await reloadPOAll(); go('campaigns');
  }catch(e){ toast('Error: '+(e.message||e)); }
}

let ORC=null;
function openOrcNew(){ const nowM=new Date().toISOString().slice(0,7); ORC={nome:'',valor:'',ini:nowM,fim:nowM}; renderOrcForm(); }
function renderOrcForm(){
  if(!ORC)return;
  $('#modalMount').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:480px">
    <div class="modal-h"><h3>New budget</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-b">
      <div class="field"><label>Name / category</label><input value="${esc(ORC.nome)}" onchange="ORC.nome=this.value" placeholder="e.g. Trade FY26"></div>
      <div class="field"><label>Total value (R$)</label><input type="number" min="0" step="1000" value="${esc(ORC.valor)}" onchange="ORC.valor=this.value" class="mono" placeholder="0,00"></div>
      <div class="fgrid">
        <div class="field"><label>Start</label><input type="month" value="${esc(ORC.ini)}" onchange="ORC.ini=this.value"></div>
        <div class="field"><label>End</label><input type="month" value="${esc(ORC.fim)}" onchange="ORC.fim=this.value"></div>
      </div>
    </div>
    <div class="modal-f"><span></span><div style="display:flex;gap:10px"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-acc" style="background:var(--po)" onclick="submitOrc()">Create budget</button></div></div>
  </div></div>`;
}
async function submitOrc(){
  if(!ORC)return;
  if(!ORC.nome.trim()){ toast('Enter the name/category.'); return; }
  const val=+ORC.valor||0; if(val<=0){ toast('Enter the total value.'); return; }
  try{
    const {error}=await SBPO.rpc('criar_orcamento',{p_nome:ORC.nome.trim(),p_valor:val,p_inicio:ORC.ini?ORC.ini+'-01':null,p_fim:ORC.fim?ORC.fim+'-01':null});
    if(error)throw error;
    toast('Budget created ✓'); closeModal(); await reloadPOAll(); go('budgets');
  }catch(e){ toast('Error: '+(e.message||e)); }
}

let FEE=null;
function openFeeEditor(){ FEE=(DATA.fee||[]).map(f=>({agencia:f.agencia||'',tipo:f.tipo||'',categoria:f.categoria||'',percentual:f.percentual!=null?Math.round(f.percentual*1000)/10:'',cc:f.cc||'',account:f.account||'',descricao:f.descricao||''})); if(!FEE.length)FEE=[{agencia:'',tipo:'',categoria:'',percentual:'',cc:'',account:'',descricao:''}]; renderFeeEditor(); }
function feeRowSet(i,k,v){ if(FEE&&FEE[i])FEE[i][k]=v; }
function feeAddRow(){ FEE.push({agencia:'',tipo:'',categoria:'',percentual:'',cc:'',account:'',descricao:''}); renderFeeEditor(); }
function feeDelRow(i){ FEE.splice(i,1); renderFeeEditor(); }
function renderFeeEditor(){
  if(!FEE)return;
  const inp=(i,k,ph,w)=>`<input value="${esc(FEE[i][k])}" onchange="feeRowSet(${i},'${k}',this.value)" placeholder="${ph}" style="width:${w||'100%'};padding:6px 8px;border:1px solid var(--line-2);border-radius:7px;background:#fff;font:inherit;font-size:12px">`;
  const rows=FEE.map((f,i)=>`<div style="display:grid;grid-template-columns:1fr 1fr .8fr .6fr 1fr 1fr 1.4fr 24px;gap:7px;align-items:center;margin-bottom:7px">
    ${inp(i,'agencia','Agency')}${inp(i,'tipo','Type (FEE/KOL…)')}${inp(i,'categoria','Category')}<input type="number" value="${esc(f.percentual)}" onchange="feeRowSet(${i},'percentual',this.value)" placeholder="%" style="padding:6px 8px;border:1px solid var(--line-2);border-radius:7px;background:#fff;font:inherit;font-size:12px;text-align:right" class="mono">${inp(i,'cc','Cost center')}${inp(i,'account','Account')}${inp(i,'descricao','Description')}<button onclick="feeDelRow(${i})" style="width:24px;height:24px;border-radius:6px;border:none;background:transparent;color:var(--txt-3);font-size:11px;cursor:pointer">✕</button>
  </div>`).join('');
  $('#modalMount').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:920px">
    <div class="modal-h"><h3>Fee split configuration (rateio)</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-b">
      <div style="font-size:11.5px;color:var(--txt-3);margin-bottom:10px">Define how a shared invoice is split across categories by fixed percentages. % is per row; each row carries its cost center and account for the payment process.</div>
      <div style="display:grid;grid-template-columns:1fr 1fr .8fr .6fr 1fr 1fr 1.4fr 24px;gap:7px;font-size:10px;font-weight:700;color:var(--txt-3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px"><span>Agency</span><span>Type</span><span>Category</span><span style="text-align:right">%</span><span>Cost center</span><span>Account</span><span>Description</span><span></span></div>
      ${rows}
      <button class="btn-ghost" onclick="feeAddRow()" style="margin-top:4px">+ Add split row</button>
    </div>
    <div class="modal-f"><span></span><div style="display:flex;gap:10px"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-acc" style="background:var(--po)" onclick="saveFee()">Save splits</button></div></div>
  </div></div>`;
}
async function saveFee(){
  if(!FEE)return;
  const rows=FEE.filter(f=>(f.agencia||'').trim()&&(f.tipo||'').trim()).map(f=>({agencia:f.agencia.trim(),tipo:f.tipo.trim(),categoria:(f.categoria||'').trim(),percentual:(+f.percentual||0)/100,cc:(f.cc||'').trim(),account:(f.account||'').trim(),descricao:(f.descricao||'').trim()}));
  try{
    await SBPO.from('fee_rateio').delete().not('agencia','is',null);
    if(rows.length){ const {error}=await SBPO.from('fee_rateio').insert(rows); if(error)throw error; }
    const {data:fee}=await SBPO.from('fee_rateio').select('agencia,tipo,categoria,percentual,cc,account,descricao'); DATA.fee=fee||[];
    toast('Fee splits saved ✓'); closeModal(); go('budgets');
  }catch(e){ toast('Error: '+(e.message||e)); }
}

/* ============================================================
   INIT
   ============================================================ */
boot();
</script>
