<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#10131a">
<title>TCL Platform — Work + Budget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    /* neutrals — cool graphite scale */
    --ink:#10131a; --ink-2:#1a1e27; --ink-3:#252b3a;
    --paper:#f3f4f8; --paper-2:#fafbfd; --card:#fff;
    --line:#e4e7ee; --line-2:#d2d6e0;
    --txt:#171a21; --txt-2:#59606e; --txt-3:#6f7684;
    /* brand duality — Work (cobalt) + Budget (TCL red) */
    --accent:#2b4fdd; --accent-deep:#1f3cba; --accent-soft:#e9edfc;
    --po:#e20613; --po-deep:#b4000b; --po-soft:#fde9ea;
    /* status */
    --green:#16a06a; --green-bg:#e2f5eb; --amber:#d68a04; --amber-bg:#fbf0d8; --amber-ink:#9c6404;
    --red:#e0392b; --red-bg:#fbe4e1; --violet:#6d4bd1; --violet-bg:#ece6fa;
    --blue:#1273cf; --blue-bg:#e0eefb; --slate:#59606e; --slate-bg:#e9ecf2;
    /* type */
    --sans:'Hanken Grotesk',system-ui,-apple-system,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    /* elevation */
    --sh-1:0 1px 2px rgba(16,19,26,.05),0 1px 3px rgba(16,19,26,.04);
    --sh-2:0 2px 6px -1px rgba(16,19,26,.07),0 6px 16px -6px rgba(16,19,26,.08);
    --sh-3:0 24px 64px -16px rgba(16,19,26,.38),0 8px 24px -12px rgba(16,19,26,.22);
    /* motion */
    --ease:cubic-bezier(.22,1,.36,1); --fast:.15s; --med:.22s;
    /* focus */
    --ring:0 0 0 3px rgba(43,79,221,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);background:var(--paper);color:var(--txt);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  h1,h2,h3,h4{font-family:var(--sans);letter-spacing:-.02em;font-weight:700;text-wrap:balance}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;transition:background var(--fast) var(--ease),color var(--fast) var(--ease),border-color var(--fast) var(--ease),box-shadow var(--fast) var(--ease),filter var(--fast) var(--ease),transform var(--fast) var(--ease)}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  ::selection{background:rgba(43,79,221,.16)}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
  input,select,textarea{accent-color:var(--accent)}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#c7ccd8;border-radius:8px;border:2px solid var(--paper)}
  ::-webkit-scrollbar-thumb:hover{background:#a9b0c0}

  /* ===== AUTH GATE ===== */
  .gate{position:fixed;inset:0;z-index:200;background:var(--ink);background-image:radial-gradient(52rem 34rem at 12% -8%,rgba(43,79,221,.22),transparent 60%),radial-gradient(46rem 30rem at 96% 108%,rgba(226,6,19,.16),transparent 60%);display:none;align-items:center;justify-content:center;padding:24px}
  .gate.show{display:flex}
  .gate-card{background:var(--card);border-radius:20px;padding:40px 34px 34px;max-width:400px;width:100%;text-align:center;box-shadow:var(--sh-3);animation:gateIn .35s var(--ease) both}
  @keyframes gateIn{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
  .gate-logo{width:56px;height:56px;border-radius:15px;background:linear-gradient(135deg,var(--accent) 50%,var(--po) 50%);color:#fff;font-weight:800;font-size:26px;display:grid;place-items:center;margin:0 auto 18px;box-shadow:0 8px 20px -6px rgba(16,19,26,.4)}
  .gate-card h2{font-size:21px;letter-spacing:-.025em;margin-bottom:6px}
  .gate-card p{font-size:13px;color:var(--txt-2);line-height:1.55;margin-bottom:22px}
  .gate-inp{width:100%;background:var(--paper);border:1px solid var(--line);color:var(--txt);border-radius:11px;padding:12px 14px;font:inherit;font-size:14px;margin-bottom:10px;outline:none;transition:border-color var(--fast),box-shadow var(--fast),background var(--fast)}
  .gate-inp::placeholder{color:var(--txt-3)}
  .gate-inp:focus{border-color:var(--accent);background:#fff;box-shadow:var(--ring)}
  .gate-btn{width:100%;justify-content:center;display:inline-flex;align-items:center;gap:10px;background:var(--ink);color:#fff;padding:13px 22px;border-radius:11px;font-weight:700;font-size:14px;cursor:pointer;margin-top:2px}
  .gate-btn:hover{background:var(--accent)}
  .gate-btn:active{transform:scale(.985)}
  .gate-btn:disabled{opacity:.55;cursor:default;transform:none}
  .gate-links{display:flex;justify-content:space-between;gap:10px;margin-top:16px}
  .gate-links a{color:var(--txt-2);font-size:12.5px;cursor:pointer}
  .gate-links a:hover{color:var(--accent);text-decoration:none}
  .hide{display:none!important}
  .skip-link{position:absolute;left:-9999px;top:0;z-index:400;background:var(--ink);color:#fff;padding:10px 16px;border-radius:0 0 10px 0;font-weight:700;font-size:13px}
  .skip-link:focus{left:0;text-decoration:none;outline:2px solid var(--accent);outline-offset:2px}

  /* ===== SHELL ===== */
  .app{display:flex;min-height:100vh}
  .side{width:236px;flex-shrink:0;background:var(--ink);color:#ced4e0;padding:20px 14px 16px;display:flex;flex-direction:column;gap:2px;position:sticky;top:0;height:100vh;overflow-y:auto}
  .side::-webkit-scrollbar-thumb{border-color:var(--ink)}
  .brand{display:flex;align-items:center;gap:11px;padding:2px 8px 18px}
  .brand .dot{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent) 50%,var(--po) 50%);display:grid;place-items:center;font-weight:800;color:#fff;font-size:16px;flex-shrink:0;box-shadow:0 4px 12px -3px rgba(0,0,0,.5)}
  .brand b{color:#fff;font-size:14px;font-weight:700;display:block;line-height:1.15;letter-spacing:-.01em}
  .brand span{font-family:var(--mono);font-size:9px;color:#7d8493;letter-spacing:.12em;text-transform:uppercase}
  .nav-sec{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.18em;padding:16px 11px 6px}
  .nav-sec.work{color:#8fa3ff} .nav-sec.budget{color:#ff8d95}
  .nav-btn{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;color:#a2a9b8;font-weight:600;font-size:12.5px;width:100%;text-align:left;position:relative}
  .nav-btn:hover{background:var(--ink-2);color:#fff}
  .nav-btn.on{background:var(--ink-3);color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)}
  .nav-btn .dot2{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:box-shadow var(--fast)}
  .nav-btn.on .dot2{box-shadow:0 0 0 3px rgba(255,255,255,.09)}
  .nav-btn .badge{margin-left:auto;background:var(--po);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:800;font-family:var(--mono)}
  .side-foot{margin-top:auto;padding-top:12px;border-top:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:4px}
  .side-foot .acct{display:flex;align-items:center;gap:8px;padding:8px 10px;color:#8a90a0;font-size:11px;font-weight:600}
  .side-foot .acct .av{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:10px;font-weight:800;flex-shrink:0}
  .side-foot .acct span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .side-foot button{padding:8px 10px;border-radius:8px;background:var(--ink-2);color:#c8cedb;font-size:11.5px;font-weight:600;text-align:left}
  .side-foot button:hover{background:var(--ink-3);color:#fff}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .top{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:15px 28px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.82);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);position:sticky;top:0;z-index:20}
  .top .tl{display:flex;align-items:center;gap:13px;min-width:0}
  .top .barcol{width:7px;height:32px;border-radius:4px;flex-shrink:0}
  .top h1{font-size:18px;letter-spacing:-.025em;margin:0}
  .top .sub{font-size:12px;color:var(--txt-3);margin-top:1px}
  .view{flex:1;padding:26px 28px 56px;overflow-y:auto}

  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:22px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 15px 13px;position:relative;overflow:hidden;box-shadow:var(--sh-1);transition:box-shadow var(--med) var(--ease),transform var(--med) var(--ease)}
  .kpi:hover{box-shadow:var(--sh-2);transform:translateY(-1px)}
  .kpi .bar{position:absolute;left:0;right:0;top:0;bottom:auto;width:auto;height:3px}
  .kpi .lbl{font-size:10.5px;color:var(--txt-2);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
  .kpi .num{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:25px;font-weight:700;margin-top:8px;letter-spacing:-.045em}
  .kpi .meta{font-size:11px;color:var(--txt-3);margin-top:4px}
  .grid2{display:grid;grid-template-columns:1.45fr 1fr;gap:18px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--sh-1)}
  .panel-h{padding:14px 18px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .panel-h h3{font-size:14px;letter-spacing:-.015em}
  .panel-h .tag{font-family:var(--mono);font-size:10.5px;color:var(--txt-3);font-weight:500;letter-spacing:.02em}
  .panel-b{padding:6px 8px}
  .row-item{display:flex;gap:11px;padding:12px 11px;border-radius:10px;align-items:flex-start;cursor:pointer;transition:background var(--fast) var(--ease)}
  .row-item:hover{background:var(--paper)}
  .pin{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
  .rt{text-align:right;flex-shrink:0}
  .who{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;background:var(--ink);color:#fff;padding:2px 9px;border-radius:20px;margin-top:6px}
  .empty{text-align:center;padding:36px 16px;color:var(--txt-3);font-size:13px}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .badge .d{width:6px;height:6px;border-radius:50%}
  .s-green{background:var(--green-bg);color:#0c7048}.s-green .d{background:var(--green)}
  .s-amber{background:var(--amber-bg);color:#9c6404}.s-amber .d{background:var(--amber)}
  .s-red{background:var(--red-bg);color:#b32418}.s-red .d{background:var(--red)}
  .s-violet{background:var(--violet-bg);color:#5535ad}.s-violet .d{background:var(--violet)}
  .s-blue{background:var(--blue-bg);color:#0e5ba6}.s-blue .d{background:var(--blue)}
  .s-slate{background:var(--slate-bg);color:#494c54}.s-slate .d{background:var(--slate)}
  .avatar{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:10.5px;font-weight:700;color:#fff;flex-shrink:0}
  .tbl-wrap{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;overflow-x:auto;box-shadow:var(--sh-1)}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--txt-3);text-transform:uppercase;letter-spacing:.08em;padding:11px 16px;border-bottom:1px solid var(--line);background:var(--paper-2);white-space:nowrap}
  td{padding:12px 16px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr{transition:background var(--fast) var(--ease)}
  tbody tr:hover{background:var(--paper)}
  th.r,td.r{text-align:right}
  .prog{height:6px;background:var(--line);border-radius:6px;overflow:hidden;width:90px}
  .prog i{display:block;height:100%;border-radius:6px}
  .meter{height:22px;border-radius:7px;overflow:hidden;display:flex;border:1px solid var(--line);background:var(--paper)}
  .meter span{display:block;height:100%}
  .stage-tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
  .banner{background:#fdf6e4;border:1px solid #ecd9a4;color:#7a5200;padding:11px 14px;border-radius:11px;font-size:12.5px;margin-bottom:18px}
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;height:60vh;color:var(--txt-3);font-size:13px}
  .loading::before{content:'';width:24px;height:24px;border-radius:50%;border:2.5px solid var(--line-2);border-top-color:var(--accent);animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(1turn)}}
  [contenteditable][data-placeholder]:empty:before{content:attr(data-placeholder);color:var(--txt-3)}
  [contenteditable] ul{margin:4px 0 4px 18px}

  /* ===== MODAL ===== */
  .overlay{position:fixed;inset:0;background:rgba(13,15,20,.5);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:36px 20px;overflow-y:auto;animation:fadeIn .16s ease-out}
  @keyframes fadeIn{from{opacity:0}}
  .modal{background:var(--card);border-radius:16px;width:100%;max-width:840px;box-shadow:var(--sh-3);animation:modalIn .2s var(--ease)}
  @keyframes modalIn{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}
  .overlay.no-anim,.modal.no-anim{animation:none}
  .modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .modal-h h3{font-size:16.5px;letter-spacing:-.02em}
  .modal-h .x{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;color:var(--txt-3);font-size:18px}
  .modal-h .x:hover{background:var(--paper);color:var(--txt)}
  .modal-b{padding:20px 22px;max-height:74vh;overflow-y:auto}
  .modal-f{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px}
  /* ===== DRAWER (painel lateral) ===== */
  .overlay.right{align-items:stretch;justify-content:flex-end;padding:0}
  .drawer{width:600px;max-width:94vw;height:100vh;height:100dvh;border-radius:0;display:flex;flex-direction:column;box-shadow:-18px 0 50px rgba(13,15,20,.3);animation:drawerIn .24s var(--ease)}
  @keyframes drawerIn{from{transform:translateX(48px);opacity:.3}to{transform:translateX(0);opacity:1}}
  .drawer .modal-b{flex:1;max-height:none;position:relative}
  .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field{margin-bottom:14px}.field.full{grid-column:1/-1}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--txt-2);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--line-2);border-radius:9px;background:var(--paper-2);font:inherit;font-size:13.5px;color:var(--txt);outline:none;transition:border-color var(--fast),box-shadow var(--fast),background var(--fast)}
  .field input::placeholder,.field textarea::placeholder{color:var(--txt-3)}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:#fff;box-shadow:var(--ring)}
  .btn-acc{padding:10px 18px;border-radius:10px;background:var(--accent);color:#fff;font-weight:700;font-size:13.5px;box-shadow:var(--sh-1)}
  .btn-acc:hover{filter:brightness(.9) saturate(1.05)}
  .btn-acc:active{transform:scale(.98)}
  .btn-ghost{padding:10px 16px;border-radius:10px;font-weight:600;font-size:13.5px;color:var(--txt-2);border:1px solid var(--line-2);background:var(--card)}
  .btn-ghost:hover{background:var(--paper);color:var(--txt);border-color:#b9bfcc}
  .btn-ghost:active{transform:scale(.98)}
  .btn-del{padding:10px 16px;border-radius:10px;font-weight:600;font-size:13px;color:var(--red);border:1px solid #f0b8b2;background:var(--card)}
  .btn-del:hover{background:var(--red);color:#fff;border-color:var(--red)}
  .btn-del:active{transform:scale(.98)}
  .atv{border:1px solid var(--line-2);border-radius:12px;padding:12px;margin-bottom:9px;background:var(--card);transition:border-color var(--fast)}
  .atv.done{background:#eef8f1;border-color:#bfe4d0}
  .atv-top{display:flex;align-items:center;gap:10px}
  .atv-top input.nm{flex:1;padding:8px 10px;border:1px solid var(--line-2);border-radius:8px;background:var(--paper-2);font-weight:600;font-size:13.5px;transition:border-color var(--fast),box-shadow var(--fast)}
  .atv-top input.nm:focus{border-color:var(--accent);box-shadow:var(--ring);outline:none}
  .atv-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px;align-items:center}
  .atv-meta input,.atv-meta select{padding:6px 9px;border:1px solid var(--line-2);border-radius:7px;background:var(--card);font:inherit;font-size:12px}
  .chip-btn{font-size:11px;font-weight:600;color:var(--txt-2);border:1px solid var(--line-2);border-radius:7px;padding:5px 9px;background:var(--card)}
  .chip-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .sub{display:flex;align-items:center;gap:7px;margin-top:5px;padding-left:6px}
  .sub input.st{flex:1;padding:5px 9px;border:1px solid var(--line-2);border-radius:6px;background:transparent;font:inherit;font-size:12.5px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 22px;border-radius:12px;font-weight:600;font-size:13.5px;opacity:0;transition:opacity .28s var(--ease),transform .28s var(--ease);z-index:300;box-shadow:var(--sh-3);border:1px solid rgba(255,255,255,.09);pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .ment{background:var(--violet-bg);color:var(--violet);font-weight:700;border-radius:4px;padding:0 4px}

  /* ===== ICONS + PROGRESS ALIGNMENT ===== */
  svg.icn{display:inline-block;vertical-align:-2px;flex-shrink:0}
  .ich{width:30px;height:30px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
  .pbar{height:6px;border-radius:4px;background:#e9ebf1;overflow:hidden;display:flex;min-width:0}
  .pbar span{display:block;height:100%}
  .pct{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:11px;font-weight:600;width:40px;text-align:right;flex-shrink:0;color:var(--txt-2)}

  /* ===== COST CENTER TABLE ===== */
  .cc-wrap{overflow-x:auto}
  .cc-tbl{border-collapse:separate;border-spacing:0;width:100%}
  .cc-tbl th{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--txt-3);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;background:var(--paper-2);border-bottom:1px solid var(--line);padding:8px 10px}
  .cc-tbl td{padding:9px 10px;border-bottom:1px solid #edeff4;white-space:nowrap;font-size:11.5px}
  .cc-tbl .num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums}
  .cc-tbl .mband{background:#fafbfe}
  .cc-tbl thead .mband{background:#f4f6fb}
  .cc-tbl .msep{border-left:1px solid var(--line)}
  .cc-tbl .s1,.cc-tbl .s2,.cc-tbl .s3{position:sticky;z-index:2;background:#fff}
  .cc-tbl .s1{left:0;min-width:92px;max-width:92px;overflow:hidden;text-overflow:ellipsis}
  .cc-tbl .s2{left:92px;min-width:96px;max-width:96px;overflow:hidden;text-overflow:ellipsis}
  .cc-tbl .s3{left:188px;min-width:170px;max-width:170px;overflow:hidden;text-overflow:ellipsis;box-shadow:inset -1px 0 0 var(--line-2)}
  .cc-tbl thead .s1,.cc-tbl thead .s2,.cc-tbl thead .s3{background:var(--paper-2);z-index:3}
  .cc-tbl tfoot td{background:var(--paper-2);border-top:1px solid var(--line);border-bottom:none;font-weight:700}

function today0(){const d=new Date();d.setHours(0,0,0,0);return d;}
function daysTo(s){if(!s)return null;const d=new Date(s+'T00:00:00');return Math.round((d-today0())/864e5);}
function fmtDate(s){if(!s)return'—';const d=new Date(String(s).includes('T')?s:s+'T00:00:00');return d.toLocaleDateString('en-US',{day:'2-digit',month:'short'});}
function fmtMes(s){if(!s)return'—';const [y,m]=String(s).slice(0,7).split('-');const MM=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return (MM[(+m)-1]||m)+'/'+String(y).slice(2);}
function stageOf(i){return STAGES.find(s=>s.id===i)||STAGES[0];}
function statusOf(i){return STATUS.find(s=>s.id===i)||STATUS[0];}
function taskDays(t){if(t&&t.inicio&&t.fim){const d=Math.round((new Date(t.fim+'T00:00:00')-new Date(t.inicio+'T00:00:00'))/864e5)+1;return d>0?d:1;}return Math.max(1,+(t&&t.w)||1);}
function computeProg(p){if(!p.tasks||!p.tasks.length)return p.prog||0;const tw=p.tasks.reduce((s,t)=>s+taskDays(t),0);const dw=p.tasks.filter(t=>t.done).reduce((s,t)=>s+taskDays(t),0);return tw?Math.round(dw/tw*100):0;}
function autoEtapa(p){const prog=computeProg(p);if(prog>=100)return'concluido';const w=['briefing','producao','revisao','ajustes','entrega'];let i=Math.floor(prog/100*w.length);if(i>4)i=4;if(i<0)i=0;return w[i];}
function effectiveEtapa(p){ if(computeProg(p)>=100) return 'concluido'; return (p.etapa_override && STAGES.some(s=>s.id===p.etapa_override)) ? p.etapa_override : autoEtapa(p); }
function autoStatus(p){const prog=computeProg(p);if(prog>=100)return'concluido';if(p.bloqueado)return'bloqueado';const dd=p.prazo?daysTo(p.prazo):null;if(dd!==null&&dd<0)return'atrasado';const overdue=(p.tasks||[]).some(t=>!t.done&&t.fim&&daysTo(t.fim)<0);if(overdue)return'atencao';return'no_prazo';}
function latestLog(p){return p.logs&&p.logs.length?p.logs[p.logs.length-1]:null;}
function computeRecommendations(){
  const out=[];
  // 1) Projects stalled in the same stage/status for too long
  DATA.projetos.forEach(p=>{
    if(p.status==='concluido')return;
    const lu=latestLog(p);
    const base=lu?lu.t:p.inicio;
    if(!base)return;
    const days=Math.round((today0()-new Date(String(base).slice(0,10)+'T00:00:00'))/864e5);
    if(days>=10){
      out.push({sev:'high',icon:'pause',text:`"${p.nome}" has had no updates in ${days} days (stage: ${stageOf(p.etapa).name}).`,onclick:`openProj('${p.id}')`});
    }
  });
  // 2) Budget >90% consumed with no closed PO yet
  if(PO_ACCESS){
    const camps=(DATA.poProjetos||[]).filter(p=>p.aprovacao_status==='APROVADO');
    const tetoBy={},consBy={},hasConcl={};
    DATA.tetos.forEach(t=>tetoBy[t.projeto_id]=(tetoBy[t.projeto_id]||0)+(+t.teto||0));
    DATA.rateio.forEach(r=>tetoBy[r.projeto_id]=(tetoBy[r.projeto_id]||0)+(+r.valor||0));
    DATA.pos.forEach(po=>{ const v=+po.valor||0; if(['FATURADA','VALIDADA','CONCLUIDA','APROVADA','PO_GERADA','ATUALIZAR_INFO'].includes(po.status)) consBy[po.projeto_id]=(consBy[po.projeto_id]||0)+v; if(po.status==='CONCLUIDA') hasConcl[po.projeto_id]=true; });
    camps.forEach(p=>{
      const tot=tetoBy[p.id]||0; if(!tot)return;
      const pct=(consBy[p.id]||0)/tot*100;
      if(pct>=90&&!hasConcl[p.id]){
        out.push({sev:'high',icon:'coins',text:`Campaign "${p.nome}" has ${Math.round(pct)}% of its budget committed but no PO has been closed (CONCLUÍDA) yet.`,onclick:`openCampDetail('${p.id}')`});
      }
    });
    // Cap possibly double-counted: rows in BOTH tetos and rateio_alocacao
    const _hasTeto=new Set(DATA.tetos.map(t=>t.projeto_id)), _hasRat=new Set(DATA.rateio.map(r=>r.projeto_id));
    camps.forEach(p=>{ if(_hasTeto.has(p.id)&&_hasRat.has(p.id)) out.push({sev:'high',icon:'scale',text:`Campaign "${p.nome}" has cap rows in BOTH tetos and rateio_alocacao — its cap may be double-counted. Check with diag_fees_rateio.sql.`,onclick:`openCampDetail('${p.id}')`}); });
    // 4) Agency PO volume vs. configured rateio split
    const feeByTipo={}; (DATA.fee||[]).forEach(f=>{ if(!f.tipo)return; (feeByTipo[f.tipo]=feeByTipo[f.tipo]||[]).push(f); });
    Object.keys(feeByTipo).forEach(tipo=>{
      const rows=feeByTipo[tipo]; const totalPct=rows.reduce((s,f)=>s+(+f.percentual||0),0); if(!totalPct)return;
      const campsTipo=camps.filter(p=>p.rateio_tipo===tipo);
      if(!campsTipo.length)return;
      const ids=new Set(campsTipo.map(p=>p.id));
      const byCat={}; DATA.rateio.forEach(r=>{ if(ids.has(r.projeto_id)&&r.categoria) byCat[r.categoria]=(byCat[r.categoria]||0)+(+r.valor||0); });
      const totalAlloc=Object.values(byCat).reduce((s,v)=>s+v,0); if(!totalAlloc)return;
      rows.forEach(f=>{
        const expected=(+f.percentual||0)/totalPct*100;
        const actual=((byCat[f.categoria]||0)/totalAlloc)*100;
        if(Math.abs(actual-expected)>=15){
          out.push({sev:'medium',icon:'scale',text:`Rateio "${tipo}" — category "${f.categoria||'—'}" is running at ${Math.round(actual)}% of allocation vs. ${Math.round(expected)}% configured.`,onclick:`go('budgets')`});
        }
      });
    });
  }
  // 3) Overdue tasks
  DATA.projetos.forEach(p=>{
    if(p.status==='concluido')return;
    (p.tasks||[]).forEach(t=>{
      if(t.done||!t.fim)return;
      const dd=daysTo(t.fim);
      if(dd!==null&&dd<0){
        out.push({sev:'medium',icon:'clock',text:`Task "${t.n||'Untitled'}" in "${p.nome}" is ${-dd} day(s) overdue.`,onclick:`openProj('${p.id}')`});
      }
    });
  });
  const order={high:0,medium:1,low:2};
  out.forEach(r=>r.hash=recHash(r.text));
  const dismissed=recDismissed(), now=Date.now();
  const visible=out.filter(r=>!(dismissed[r.hash]&&(now-dismissed[r.hash])<14*864e5));
  return visible.sort((a,b)=>order[a.sev]-order[b.sev]).slice(0,12);
}
function recDismissKey(){ return 'rec_dismissed_'+((currentUser&&currentUser.email)||'anon'); }
function recDismissed(){ try{ return JSON.parse(localStorage.getItem(recDismissKey())||'{}'); }catch(e){ return {}; } }
function recHash(t){ let h=0; for(const c of t) h=(h*31+c.charCodeAt(0))|0; return String(h); }
function dismissRec(hash){ const d=recDismissed(); d[hash]=Date.now(); try{localStorage.setItem(recDismissKey(),JSON.stringify(d));}catch(e){} go(SCREEN); }
let AI_SUMMARY='', AI_LOADING=false;
async function generateAISummary(){
  if(!(window.claude&&window.claude.complete))return;
  AI_LOADING=true; go(SCREEN);
  try{
    const recs=computeRecommendations();
    const prompt='You are an operations assistant for a marketing budget/PO platform. Given this JSON list of automatically-detected issues, write a short (max 5 bullet) executive summary in English, prioritized, for an admin. Be concrete and reference names. JSON:\n'+JSON.stringify(recs.map(r=>r.text));
    const text=await window.claude.complete(prompt);
    AI_SUMMARY=text||'';
  }catch(e){ AI_SUMMARY='Could not generate summary: '+(e.message||e); }
  AI_LOADING=false; go(SCREEN);
}

      <span style="display:inline-block;transition:.15s;transform:rotate(${RECS_OPEN?'180deg':'0deg'});color:var(--txt-3);font-size:12px">▾</span></span></div>
    ${RECS_OPEN?`

    ${AI_SUMMARY?`<div style="margin:12px 17px 0;padding:12px 14px;background:#f3f0fb;border:1px solid #ded4f5;border-radius:10px;font-size:12.5px;color:#4a3c80;white-space:pre-wrap;line-height:1.6">${esc(AI_SUMMARY)}</div>`:''}
    <div class="panel-b">${recs.length?recs.map(r=>{const s=sevMeta[r.sev]||sevMeta.low;return `<div style="display:flex;align-items:center;gap:11px;padding:11px 11px;border-radius:10px">

        <button class="chip-btn" onclick="${r.onclick}">Open →</button>
        <button class="chip-btn" title="Dismiss for 14 days" onclick="dismissRec('${r.hash}')">✕</button>
      </div>
    </div>`;}).join(''):'<div class="empty">No issues detected.</div>'}</div>`:''}</div>`;
}
function deadlineInfo(p){if(autoStatus(p)==='concluido')return{cls:'ok',txt:fmtDate(p.prazo),sub:'completed',color:'var(--slate)'};const dd=daysTo(p.prazo);if(dd===null)return{cls:'ok',txt:'—',sub:'',color:'var(--txt-3)'};if(dd<0)return{cls:'late',txt:fmtDate(p.prazo),sub:Math.abs(dd)+'d late',color:'var(--red)'};if(dd<=5)return{cls:'soon',txt:fmtDate(p.prazo),sub:'in '+dd+'d',color:'var(--amber-ink)'};return{cls:'ok',txt:fmtDate(p.prazo),sub:'in '+dd+'d',color:'var(--txt-2)'};}

async function fnCall(action,payload){

  _senha=senha;showGate('Signing in…');

  if(!email){showGate('Enter your email.');return;}
  const b=$('#caSendBtn');b.disabled=true;b.textContent='Sending…';

async function setPassword(){
  const email=($('#caEmail').value||'').trim().toLowerCase(),codigo=($('#caCode').value||'').trim(),senha=$('#caSenha').value||'';

/* Network backstop: even though every write path already checks viewOnly()
   (true in demo mode) before touching SB/SBPO, swap both clients for an
   inert stub too — belt and suspenders, so a write path that's missed a
   viewOnly() check (e.g. something in the Work module) fails safely
   instead of silently reaching the real Supabase projects. */
function fakeSupabaseClient(){
  const err={message:'Demo mode — no backend connected.'};
  const builder={select(){return builder;},eq(){return builder;},neq(){return builder;},in(){return builder;},not(){return builder;},order(){return builder;},limit(){return builder;},
    update(){return builder;},upsert(){return builder;},insert(){return builder;},delete(){return builder;},
    maybeSingle:()=>Promise.resolve({data:null,error:null}),single:()=>Promise.resolve({data:null,error:err}),
    then(resolve){ resolve({data:null,error:err}); }};
  return {
    auth:{ getSession:async()=>({data:{session:null}}), signOut:async()=>({error:null}), signInWithPassword:async()=>({data:null,error:err}), onAuthStateChange:()=>({data:{subscription:{unsubscribe(){}}}}) },
    from(){ return builder; },
    rpc:async()=>({data:null,error:err})
  };
}
function startDemo(){
  DEMO_MODE=true;
  SB=fakeSupabaseClient(); SBPO=fakeSupabaseClient();
  seedDemoData();
  hideGate();
  demoSetRole('admin');
}

async function boot(){
  try{
    if(new URLSearchParams(location.search).get('demo')==='1'){ startDemo(); return; }
  }catch(e){}
  try{
    const {data}=await SB.auth.getSession();
    if(data&&data.session&&data.session.user){onSignedIn(data.session.user);return;}
  }catch(e){}
  showGate();
  SB.auth.onAuthStateChange((ev,sess)=>{
    if(sess&&sess.user){if(!booted)setTimeout(()=>onSignedIn(sess.user),0);}
    else if(ev==='SIGNED_OUT'){booted=false;_senha='';showGate('Session ended. Sign in again.');}
  });
}
async function onSignedIn(user){

/* Last-known role cache — a failed Budget SSO (wrong/expired password, e-mail
   mismatch between the Work and Budget accounts, etc.) must not blank out
   who this person IS in the Work module. Budget access itself still requires
   a live, successfully-authenticated Budget session (PO_ACCESS), but the
   Work module's own nav/visibility can safely fall back to the last role we
   confirmed for this e-mail, instead of defaulting to "no restriction". */
function roleCacheKey(email){ return 'role_cache_'+(email||'').toLowerCase(); }
function cacheRole(email,papel,agencia){ try{ localStorage.setItem(roleCacheKey(email),JSON.stringify({papel,agencia,t:Date.now()})); }catch(e){} }
function cachedRole(email){ try{ const raw=localStorage.getItem(roleCacheKey(email)); return raw?JSON.parse(raw):null; }catch(e){ return null; } }
function useCachedRole(em){
  const c=cachedRole(em);
  if(c&&c.papel){ PAPEL=c.papel; MINHA_AGENCIA=c.agencia||''; window.__poErr=(window.__poErr||'')+' (using last-known role, offline from Budget)'; }
}
/* SSO silencioso com o PO (mesma senha) — acesso derivado do papel real */
async function ssoPO(email){
  const em=(email||'').toLowerCase();
  window.__poErr='';
  let pw=_senha; if(!pw){ try{ pw=sessionStorage.getItem('__pw')||''; }catch(e){} }
  let {data:sPO}=await SBPO.auth.getSession();
  if(!(sPO&&sPO.session)){
    if(!pw){ window.__poErr='sign out and sign in typing your password'; PO_ACCESS=false; useCachedRole(em); return; }
    const {error}=await SBPO.auth.signInWithPassword({email:em,password:pw});
    if(error){
      // senha divergente entre painel e PO — sincroniza via função unify e tenta de novo
      try{
        const r=await fetch(PO_URL+'/functions/v1/unify',{method:'POST',headers:{'Content-Type':'application/json','apikey':PO_KEY,'Authorization':'Bearer '+PO_KEY},body:JSON.stringify({email:em,password:pw})});
        const j=await r.json();
        if(j&&j.ok){ const {error:e2}=await SBPO.auth.signInWithPassword({email:em,password:pw}); if(e2){ window.__poErr='after unify: '+e2.message; PO_ACCESS=false;_senha='';useCachedRole(em);return; } }
        else { window.__poErr='unify: '+((j&&j.error)||'failed'); PO_ACCESS=false;_senha='';useCachedRole(em);return; }
      }catch(ue){ window.__poErr=error.message; PO_ACCESS=false;_senha='';useCachedRole(em);return; }
    }
    ({data:sPO}=await SBPO.auth.getSession());
  }
  _senha='';
  try{
    const {data:p,error}=await SBPO.rpc('papel_atual');
    if(error){ window.__poErr='papel_atual: '+error.message; }
    PAPEL=p||'';
    PO_ACCESS=!!PAPEL && PAPEL!=='pendente';
    if(!PAPEL){ if(!window.__poErr) window.__poErr='no role for '+em+' in PO'; useCachedRole(em); }
  }catch(e){ PO_ACCESS=false; window.__poErr=(e&&e.message)||'papel_atual failed'; useCachedRole(em); }
  if(PAPEL==='agencia'){ try{ const {data:a}=await SBPO.rpc('agencia_atual'); MINHA_AGENCIA=a||''; }catch(e){} }
  if(PO_ACCESS&&PAPEL) cacheRole(em,PAPEL,MINHA_AGENCIA);
}

/* Export (read-only) — one row per project already in projList() (respects the
   active business-type/status filters), plus one activities sheet per project. */
function sanitizeSheetName(name){
  return (name||'').replace(/[:\\\/\?\*\[\]]/g,'').trim().slice(0,31)||'Projeto';
}
function exportWorkXLSX(){
  if(!window.XLSX){ toast('Exportação indisponível — script não carregado.'); return; }
  const list=projList();
  if(!list.length){ toast('Nenhum projeto para exportar.'); return; }
  const wb=XLSX.utils.book_new();
  const resumo=list.map(p=>({
    'Projeto': p.nome||'',
    'Responsável': respName(p.resp)||'',
    'Início': p.inicio||'',
    'Fim': p.prazo||'',
    'Status': statusOf(p.status).name
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(resumo), 'Resumo');
  const usedNames={};
  list.forEach(p=>{
    const base=sanitizeSheetName(p.nome);
    let name=base, n=2;
    while(usedNames[name]){ name=base.slice(0,28)+'_'+n; n++; }
    usedNames[name]=true;
    const ws=XLSX.utils.aoa_to_sheet([
      ['Projeto', p.nome||''],
      ['Responsável', respName(p.resp)||''],
      ['Início', p.inicio||''],
      ['Fim', p.prazo||''],
      ['Status', statusOf(p.status).name],
      []
    ]);
    const grid=(p.tasks||[]).map(t=>({
      'Atividade': t.n||'',
      'Responsável': respName(t.resp)||'',
      'Início': t.inicio||'',
      'Fim': t.fim||'',
      'Status': statusOf(t.status).name,
      'Observações': t.obs||''
    }));
    if(grid.length) XLSX.utils.sheet_add_json(ws, grid, {origin:-1});
    XLSX.utils.book_append_sheet(wb, ws, name);
  });
  XLSX.writeFile(wb, `projetos_TCL_${new Date().toISOString().slice(0,10)}.xlsx`);
}

async function dropOnStage(ev,stageId){
  ev.preventDefault();
  const pid=DRAG_PID||ev.dataTransfer.getData('text/plain'); DRAG_PID=null;
  if(!pid)return;
  const p=DATA.projetos.find(x=>x.id===pid); if(!p)return;
  if(p.etapa===stageId)return;
  if(!canEdit(p)){ toast('You can\'t move this project.'); return; }
  const prevEtapa=p.etapa, prevOverride=p.etapa_override, prevStatus=p.status, prevLogs=(p.logs||[]).slice();
  const stg=STAGES.find(s=>s.id===stageId);
  p.etapa_override=stageId; p.etapa=stageId; p.status=autoStatus(p);
  p.logs=p.logs||[]; p.logs.push({txt:'Moved to "'+stg.name+'"',autor:(currentUser&&currentUser.email)||'—',t:new Date().toISOString()});
  go(SCREEN);
  try{
    const clean=JSON.parse(JSON.stringify(p)); delete clean._new;
    const {error}=await SB.from('projetos').upsert({id:clean.id,data:clean});
    if(error)throw error;

  }
}

  Object.keys(byCat).forEach(k=>{ catTotal[k]=byCat[k].reduce((s,p)=>s+(tetoBy[p.id]||0),0); });

          <b style="font-family:'Hanken Grotesk',sans-serif;font-size:13.5px;display:block">${esc(ck)}${m.label!==ck?` <span style=\"font-weight:500;color:var(--txt-3);font-size:11.5px\">· ${m.label}</span>`:''}</b>

          <span class="pct">${pct.toFixed(1)}%</span>
        </span>
        <span class="mono" style="font-size:12.5px;font-weight:700;color:var(--ink);width:110px;text-align:right;flex-shrink:0">${BRL(tot)}</span>
        <span style="color:var(--txt-3);display:flex;transform:rotate(${collapsed?'-90deg':'0deg'});transition:transform .15s">${icn('chev',14)}</span>

/* ===== Category view: activity columns (fixed, aligned across categories) + compact cards ===== */
const ACT_COL_ORDER=['Campaign','FEE','KOL','AON','Communication'];
function actColLabel(a){ return ({Campaign:'Campaign',FEE:'Fee',KOL:'KOL',AON:'AON',Communication:'Comms'})[a]||a||'Other'; }
// "Campaings" is a legacy misspelling that exists in some older records — fold
// it into "Campaign" so it doesn't show up as a second, visually-identical
// column (both render the same label via ACT_META, but were never the same
// grouping key).
const ACT_KEY_ALIASES={Campaings:'Campaign'};
function actKey(p){ const raw=(p.activity||'').trim()||'Other'; return ACT_KEY_ALIASES[raw]||raw; }
function orderActs(keys){
  const set=[...new Set(keys)];
  return set.sort((a,b)=>{ let ia=ACT_COL_ORDER.indexOf(a), ib=ACT_COL_ORDER.indexOf(b); if(ia<0)ia=99; if(ib<0)ib=99; return ia-ib||a.localeCompare(b); });
}
function campGlobalActs(){
  const {list}=CAMP_CTX||{list:[]};
  return orderActs(list.map(actKey));
}
function campGlobalCats(){

/* Itemized campaign row — one per campaign, grouped by activity. This is the

function campItemRowHTML(p,m){

/* ===== Campaign lifecycle + alternative views (list / timeline) ===== */
const LC_ORDER={over:0,near:1,active:2,pending:3,done:4};
function campLastMonth(pid){
  const ms=Object.keys(campMonthlyTotals(pid));
  (DATA.pos||[]).forEach(po=>{ if(po.projeto_id===pid&&po.competencia&&!['REJEITADA','CANCELADA'].includes(po.status)) ms.push(String(po.competencia).slice(0,7)); });
  ms.sort(); return ms[ms.length-1]||'';
}
function campLifecycle(p){
  if(!CAMP_CTX) return 'active';
  if(p.aprovacao_status==='PENDENTE') return 'pending';
  const {tetoBy,consBy,compBy,pendBy}=CAMP_CTX;
  const teto=tetoBy[p.id]||0, tot=(consBy[p.id]||0)+(compBy[p.id]||0)+(pendBy[p.id]||0);
  const pct=teto?tot/teto*100:0;
  const lastM=campLastMonth(p.id), nowM=new Date().toISOString().slice(0,7);
  if(teto&&pct>=99.5&&lastM&&lastM<nowM) return 'done';
  if(teto&&pct>100.5) return 'over';
  if(teto&&pct>=90) return 'near';
  return 'active';
}
function campBadgeHTML(p){
  const {tetoBy,consBy,compBy,pendBy}=CAMP_CTX;
  const teto=tetoBy[p.id]||0, tot=(consBy[p.id]||0)+(compBy[p.id]||0)+(pendBy[p.id]||0);
  const pctTot=teto?tot/teto*100:0, lc=campLifecycle(p);
  const base='font-size:10px;font-weight:700;border-radius:20px;padding:3px 9px;white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:center;gap:4px';
  if(lc==='done') return `<span style="${base};background:var(--slate-bg);color:#494c54">${icn('check',10)} Completed</span>`;
  if(lc==='over') return `<span style="${base};background:#fbe4e1;color:#bf0008">${icn('alert',11)} ${Math.round(pctTot)}% over</span>`;
  if(lc==='near') return `<span style="${base};background:#fbf0d8;color:#9c6404">${Math.round(pctTot)}% committed</span>`;
  const AP={APROVADO:{t:'Approved',c:'#1f8a4c',bg:'#e7f4ec'},PENDENTE:{t:'Pending',c:'#cf8a16',bg:'#fdf3e2'},REJEITADO:{t:'Rejected',c:'#bf0008',bg:'#fbe4e1'}};
  const ap=AP[p.aprovacao_status]||AP.PENDENTE;
  return `<span style="${base};background:${ap.bg};color:${ap.c}">${ap.t}</span>`;
}
function fmtCompactBRL(n){
  n=+n||0; if(!n) return '';
  const abs=Math.abs(n);
  if(abs>=1000000) return (n/1000000).toFixed(abs%1000000?1:0).replace('.',',')+'M';
  if(abs>=1000) return Math.round(n/1000)+'k';
  return String(Math.round(n));
}
function campTimelineHTML(fl,q){
  const {tetoBy}=CAMP_CTX;
  const rows=fl.filter(p=>p.aprovacao_status==='APROVADO').map(p=>{const mt=campMonthlyTotals(p.id);const months=Object.keys(mt).sort();return {p,mt,months,teto:tetoBy[p.id]||0};}).filter(r=>r.months.length);
  if(!rows.length) return `<div id="campBody"><div class="empty">${q?'No campaigns match "'+esc(q)+'".':'No approved campaigns with monthly values to plot.'}</div></div>`;
  const allM=[...new Set(rows.flatMap(r=>r.months))].sort();
  const axis=[]; let cm=allM[0]; const endM=allM[allM.length-1];
  while(cm<=endM&&axis.length<36){ axis.push(cm); const y=+cm.slice(0,4), mo=+cm.slice(5,7); cm=mo===12?(y+1)+'-01':cm.slice(0,4)+'-'+String(mo+1).padStart(2,'0'); }
  const maxVal=Math.max(1,...rows.flatMap(r=>Object.values(r.mt).map(v=>+v||0)));
  const nowM=new Date().toISOString().slice(0,7);
  rows.sort((a,b)=>a.months[0].localeCompare(b.months[0])||b.teto-a.teto);
  const th='font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txt-3)';
  const headCells=axis.map(mm=>`<div style="flex:1;min-width:0;padding:8px 2px;text-align:center;font-family:var(--mono);font-size:9.5px;font-weight:700;color:${mm===nowM?'#fff':'var(--txt-3)'};background:${mm===nowM?'var(--ink)':'transparent'};border-right:1px solid #edeff4;white-space:nowrap;overflow:hidden">${fmtMes(mm+'-01')}</div>`).join('');
  const trs=rows.map(r=>{
    const m=catMeta(String(r.p.product_category||'').trim()||'Uncategorized');
    const lc=campLifecycle(r.p);
    const first=r.months[0], last=r.months[r.months.length-1];
    const cells=axis.map(mm=>{
      const val=+r.mt[mm]||0, inSpan=mm>=first&&mm<=last;
      const rl=mm===first?'5px':'0', rr=mm===last?'5px':'0';
      const bg=val?m.c:(inSpan?'#e9ebf1':'transparent');
      // Past months that are fully consumed fade out — they're settled history,

      const pastDone=mm<nowM&&campMonthCap(r.p.id,mm)>0&&campMonthCons(r.p.id,mm)>=campMonthCap(r.p.id,mm)-0.5;
      const op=(val?(0.3+0.7*val/maxVal):1)*(pastDone?0.32:1);

      const isNow=mm===nowM;
      return `<div style="flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-right:1px solid #f2f3f7;padding:3px 1px;background:${isNow?'rgba(18,115,207,.09)':'transparent'}"><span title="${fmtMes(mm+'-01')} · ${val?BRL(val):'no allocation'}${pastDone?' · completed':''}" style="display:block;width:100%;height:14px;background:${bg};opacity:${op.toFixed(2)};border-radius:${rl} ${rr} ${rr} ${rl}"></span>${lbl?`<span class="mono" style="font-size:8px;font-weight:600;color:var(--txt-3);line-height:1;white-space:nowrap">${lbl}</span>`:''}</div>`;
    }).join('');

        <span style="width:8px;height:8px;border-radius:2px;background:${m.c};flex-shrink:0"></span>

    </div>`;

  const grandTotal=rows.reduce((s,r)=>s+r.teto,0);
  const totCells=axis.map(mm=>{
    const tot=rows.reduce((s,r)=>s+(+r.mt[mm]||0),0);

    <div style="display:flex;border-bottom:1px solid var(--line);background:var(--paper-2)">

}

function campDrawerJump(m){
  const el=document.getElementById('cd-'+m); if(!el)return;
  const box=el.closest('.modal-b'); if(!box)return;
  box.scrollTop+=el.getBoundingClientRect().top-box.getBoundingClientRect().top-8;

/* ============================================================
   MONTH-END BALANCE REALLOCATION — a closed month's unused cap can be
   moved forward: fully to next month, split evenly across the campaign's
   remaining registered months, or manual per-month amounts. Adds new
   tetos/rateio_alocacao rows (additive — the closed month's own record is
   untouched, everything here is summed by projeto_id+competencia elsewhere
   in the app already).
   ============================================================ */
let REALLOC=null; // {pid,fromMonth,balance,mode,splitCount,rows:[{id,mes,valor}]}
function campNextCalMonth(m){ const y=+m.slice(0,4), mo=+m.slice(5,7); return mo===12?(y+1)+'-01':m.slice(0,4)+'-'+String(mo+1).padStart(2,'0'); }
function campFutureRegisteredMonths(pid,afterM){ return Object.keys(campMonthlyTotals(pid)).filter(m=>m>afterM).sort(); }
function openReallocModal(pid,fromMonth,balance){
  const p=DATA.poProjetos.find(x=>x.id===pid); if(!p)return;
  const future=campFutureRegisteredMonths(pid,fromMonth);
  REALLOC={pid,fromMonth,balance:+balance,mode:'next',splitCount:Math.max(future.length,3),rows:[{id:uid(),mes:campNextCalMonth(fromMonth),valor:Math.round(balance)}]};
  renderReallocModal();
}
function reallocSetMode(mode){ if(!REALLOC)return; REALLOC.mode=mode; renderReallocModal(); }
function reallocSetSplitCount(v){ if(!REALLOC)return; REALLOC.splitCount=Math.max(1,Math.min(24,+v||1)); renderReallocModal(); }
function reallocManualSet(id,k,v){ const r=REALLOC&&REALLOC.rows.find(x=>x.id===id); if(r)r[k]=v; }
function reallocManualAdd(){ if(!REALLOC)return; const last=REALLOC.rows[REALLOC.rows.length-1]; REALLOC.rows.push({id:uid(),mes:last?campNextCalMonth(last.mes):campNextCalMonth(REALLOC.fromMonth),valor:''}); renderReallocModal(); }
function reallocManualDel(id){ if(!REALLOC)return; REALLOC.rows=REALLOC.rows.filter(x=>x.id!==id); renderReallocModal(); }
function reallocPreviewRows(){
  if(!REALLOC)return [];
  const {mode,fromMonth,balance,splitCount,pid}=REALLOC;
  if(mode==='next') return [{mes:campNextCalMonth(fromMonth),valor:Math.round(balance)}];
  if(mode==='split'){
    const future=campFutureRegisteredMonths(pid,fromMonth);
    let months=future;
    if(!months.length){ months=[]; let m=fromMonth; for(let i=0;i<splitCount;i++){ m=campNextCalMonth(m); months.push(m); } }
    const n=months.length||1, each=Math.floor(balance/n);
    return months.map((m,i)=>({mes:m,valor:i===n-1?Math.round(balance)-each*(n-1):each}));
  }
  return REALLOC.rows.map(r=>({mes:r.mes,valor:+r.valor||0}));
}
function renderReallocModal(){
  if(!REALLOC)return;
  const {fromMonth,balance,mode}=REALLOC;
  const preview=reallocPreviewRows();
  const sum=preview.reduce((s,r)=>s+(+r.valor||0),0);
  const mismatch=mode==='manual'&&Math.round(sum)!==Math.round(balance);
  const future=campFutureRegisteredMonths(REALLOC.pid,fromMonth);
  const modeCard=(id,title,desc)=>`<label style="display:flex;align-items:flex-start;gap:10px;border:1.5px solid ${mode===id?'var(--po)':'var(--line)'};background:${mode===id?'#fff8f7':'#fff'};border-radius:11px;padding:11px 13px;cursor:pointer">
    <input type="radio" name="reallocMode" ${mode===id?'checked':''} onchange="reallocSetMode('${id}')" style="margin-top:2px;accent-color:var(--po);flex-shrink:0">
    <span><b style="font-size:13px;display:block">${title}</b><span style="font-size:11.5px;color:var(--txt-3)">${desc}</span></span>
  </label>`;
  const splitNote=mode==='split'?`<div style="margin-top:9px;font-size:11.5px;color:var(--txt-3)">${future.length?`Split across the ${future.length} remaining registered month(s): ${future.map(m=>fmtMes(m+'-01')).join(', ')}.`:`No future months registered yet — splitting across the next <input type="number" min="1" max="24" value="${REALLOC.splitCount}" onchange="reallocSetSplitCount(this.value)" style="width:44px;padding:3px 6px;border:1px solid var(--line-2);border-radius:6px;font:inherit;font-size:11.5px;text-align:center" class="mono"> month(s).`}</div>`:'';
  const manualRows=mode==='manual'?`<div style="margin-top:10px;display:flex;flex-direction:column;gap:8px">

/* tetos has UNIQUE(projeto_id,competencia) — a target month that already has a
   cap must be UPDATED (existing + amount), never inserted a second time. */
async function reallocCreditTetos(pid,targets){
  for(const t of targets){
    const comp=t.mes+'-01';
    const {data,error}=await SBPO.from('tetos').select('id,teto').eq('projeto_id',pid).eq('competencia',comp).limit(1);
    if(error)throw error;
    const cur=(data||[])[0];
    if(cur){ const {error:e2}=await SBPO.from('tetos').update({teto:Math.round((+cur.teto||0)+(+t.valor||0))}).eq('id',cur.id); if(e2)throw e2; }
    else{ const {error:e3}=await SBPO.from('tetos').insert({projeto_id:pid,competencia:comp,teto:Math.round(+t.valor||0),definido_por:'realocacao'}); if(e3)throw e3; }
  }
}
/* Reallocation MOVES money: the source month's cap must drop by the same amount,
   otherwise the total budget grows. teto has CHECK (teto >= 0). */
async function reallocDebitTetos(pid,fromMonth,amount){
  const comp=fromMonth+'-01';
  const {data,error}=await SBPO.from('tetos').select('id,teto').eq('projeto_id',pid).eq('competencia',comp).limit(1);
  if(error)throw error;
  const cur=(data||[])[0]; if(!cur)return;
  const {error:e2}=await SBPO.from('tetos').update({teto:Math.max(0,Math.round((+cur.teto||0)-(+amount||0)))}).eq('id',cur.id);
  if(e2)throw e2;
}
/* rateio_alocacao has no unique key (rows are summed), but the source month's
   rows still have to be reduced proportionally by the amount moved out. */
async function reallocDebitRateio(pid,fromMonth,amount){
  const comp=fromMonth+'-01';
  const {data,error}=await SBPO.from('rateio_alocacao').select('id,valor').eq('projeto_id',pid).eq('competencia',comp);
  if(error)throw error;
  const rows=data||[]; const tot=rows.reduce((s,r)=>s+(+r.valor||0),0); if(!tot)return;
  for(const r of rows){
    const nv=Math.max(0,Math.round((+r.valor||0)-(+amount||0)*((+r.valor||0)/tot)));
    const {error:e2}=await SBPO.from('rateio_alocacao').update({valor:nv}).eq('id',r.id); if(e2)throw e2;
  }
}
async function submitRealloc(){
  if(viewOnly()){toast(roMsg());return;}
  if(!REALLOC)return;
  const preview=reallocPreviewRows().filter(r=>r.mes&&(+r.valor||0)>0);
  if(!preview.length){ toast('Add at least one month with a value.'); return; }
  const sum=preview.reduce((s,r)=>s+(+r.valor||0),0);
  if(REALLOC.mode==='manual'&&Math.round(sum)!==Math.round(REALLOC.balance)){ toast('Total must match the available balance.'); return; }
  const p=DATA.poProjetos.find(x=>x.id===REALLOC.pid); if(!p)return;
  const moved=Math.round(sum);
  try{
    if(p.rateio){
      const cats=[...new Set((DATA.rateio||[]).filter(r=>r.projeto_id===p.id).map(r=>r.categoria))];
      if(!cats.length){ toast('Cannot resolve rateio categories for this campaign.'); return; }
      const totalByCat={}; (DATA.rateio||[]).filter(r=>r.projeto_id===p.id&&r.competencia&&String(r.competencia).slice(0,7)===REALLOC.fromMonth).forEach(r=>{ totalByCat[r.categoria]=(totalByCat[r.categoria]||0)+(+r.valor||0); });
      const totAll=Object.values(totalByCat).reduce((a,b)=>a+b,0)||1;
      const rows=[];
      preview.forEach(pr=>{ cats.forEach(cat=>{ const share=(totalByCat[cat]||(totAll/cats.length))/totAll; rows.push({projeto_id:p.id,categoria:cat,competencia:pr.mes+'-01',valor:Math.round(pr.valor*share)}); }); });
      const {error}=await SBPO.from('rateio_alocacao').insert(rows); if(error)throw error;
      await reallocDebitRateio(p.id,REALLOC.fromMonth,moved);
    } else {
      await reallocCreditTetos(p.id,preview);
      await reallocDebitTetos(p.id,REALLOC.fromMonth,moved);
    }
    toast('Balance reallocated ✓'); REALLOC=null; await reloadPOAll(); openCampDetail(p.id);
  }catch(e){ toast('Error: '+(e.message||e)); }
}

   (TV/AC/MOB/REF/WG/LABG) so the budget the value belongs to is unambiguous.
   Values/months are untouched; only classification + name/agency change. */
let CAMPEDIT=null;
function guessCat(str){ const s=String(str||'').toUpperCase(); for(const c of PRODUCT_CATS){ if(new RegExp('(^|[^A-Z])'+c+'([^A-Z]|$)').test(s)) return c; } return ''; }
function campMonthlyTotals(pid){
  const m={};
  DATA.tetos.filter(t=>t.projeto_id===pid).forEach(t=>{const k=String(t.competencia).slice(0,7);m[k]=(m[k]||0)+(+t.teto||0);});
  DATA.rateio.filter(r=>r.projeto_id===pid).forEach(r=>{const k=String(r.competencia).slice(0,7);m[k]=(m[k]||0)+(+r.valor||0);});
  return m; // {'2026-07': 148000, ...}
}
function recoverQual(pid){
  // Prefer the persisted rateio type (deterministic). Fall back to the old
  // heuristic only for legacy campaigns saved before rateio_tipo existed.
  const p=(DATA.poProjetos||[]).find(x=>x.id===pid);
  if(p&&p.rateio_tipo) return p.rateio_tipo;
  const cs=new Set((DATA.rateio||[]).filter(r=>r.projeto_id===pid&&r.categoria).map(r=>r.categoria));
  if(!cs.size) return '';
  let found='';
  rateioTipos().forEach(tp=>{ const tset=new Set((DATA.fee||[]).filter(f=>f.tipo===tp).map(f=>f.categoria)); if(tset.size===cs.size && [...cs].every(c=>tset.has(c))) found=tp; });
  return found;
}

  </div>`:'<div class="empty">No POs found for your access.</div>';
  const projPend=DATA.poProjetos.filter(p=>p.aprovacao_status==='PENDENTE');
  const canAprovaCamp=demoWritable(['admin','marketing','financeiro'].includes(PAPEL)||isManager);
  const tetoPend={};
  if(projPend.length){ DATA.tetos.forEach(t=>tetoPend[t.projeto_id]=(tetoPend[t.projeto_id]||0)+(+t.teto||0)); DATA.rateio.forEach(r=>tetoPend[r.projeto_id]=(tetoPend[r.projeto_id]||0)+(+r.valor||0)); }
  const campPend=projPend.length?`<div style="background:#fff;border:1px solid #f2c4bf;border-radius:13px;overflow:hidden;box-shadow:0 1px 2px rgba(20,22,28,.05);margin-bottom:16px">
    <div style="padding:14px 17px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px"><b style="font-family:'Hanken Grotesk',sans-serif;font-size:14px">Campaigns awaiting approval</b><span style="background:var(--po);color:#fff;border-radius:10px;padding:1px 8px;font-size:10.5px;font-weight:800">${projPend.length}</span></div>
    <div style="padding:12px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px">${projPend.map(p=>`<div style="border:1px solid var(--line);border-radius:11px;padding:13px 15px;background:#fafbfd">
      <div style="display:flex;justify-content:space-between;gap:10px"><b style="font-size:13px">${esc(p.nome)}</b><span class="mono" style="font-size:12px">${BRL(tetoPend[p.id]||0)}</span></div>
      <div style="font-size:11.5px;color:var(--txt-3);margin-top:3px">${esc(p.agencia||'')} · ${esc(p.product_category||'')} · ${esc(p.activity||'')}</div>
      ${canAprovaCamp?`<div style="display:flex;gap:7px;margin-top:10px"><button onclick="aprovarCamp('${esc(p.id)}')" style="padding:7px 14px;border-radius:8px;border:none;background:var(--po);color:#fff;font-weight:700;font-size:12px;cursor:pointer">Approve</button><button onclick="rejeitarCamp('${esc(p.id)}')" style="padding:7px 14px;border-radius:8px;border:1px solid var(--line-2);background:#fff;color:var(--txt-2);font-weight:700;font-size:12px;cursor:pointer">Reject</button></div>`:''}
    </div>`).join('')}</div></div>`:'';
  return campPend+filt+tabsHTML+`<div id="poBody">${body}</div>
    <div style="font-size:11.5px;color:var(--txt-3);margin-top:10px">Lifecycle: request → approve → issue nº → invoice (NF + evidence) → validate. Approve/Reject is live for admin and marketing.</div>`;
}

   PO LIFECYCLE — issue nº, invoice (NF), validate (chama RPCs do PO)

function fmtDataBR(s){ if(!s)return'—'; const p=String(s).slice(0,10).split('-'); return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:s; }
function calcVencimento(dateStr){
  if(!dateStr)return null;
  const d=new Date(dateStr+'T00:00:00'); const day=d.getDate(); const y=d.getFullYear(), m=d.getMonth();
  if(day<=8) return new Date(y,m,25);
  if(day<=12) return new Date(y,m+1,5);
  if(day<=18) return new Date(y,m+1,15);
  return new Date(y,m+1,25); // 19-25 e 26-31 (bloqueio) → dia 25 do mês seguinte
}
function fmtDateObjBR(d){ if(!d)return'—'; return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); }
function poEstimativaPagamento(po){
  if(po.vencimento) return {date:fmtDataBR(po.vencimento),confirmed:true};
  if(['REJEITADA','CANCELADA'].includes(po.status)) return null;
  const base=po.solicitado_em?String(po.solicitado_em).slice(0,10):null;
  if(!base) return null;
  return {date:fmtDateObjBR(calcVencimento(base)),confirmed:false};
}

const PO_STAGE_FLOW=['SOLICITADA','EM_APROVACAO','APROVADA','PO_GERADA','FATURADA','VALIDADA','CONCLUIDA'];
function poStageIndex(status){ if(status==='ATUALIZAR_INFO') return PO_STAGE_FLOW.indexOf('PO_GERADA'); return PO_STAGE_FLOW.indexOf(status); }
const PO_FIELD_MATRIX={
  solicitacao:{stages:['SOLICITADA','EM_APROVACAO','APROVADA','PO_GERADA','ATUALIZAR_INFO','FATURADA','VALIDADA','CONCLUIDA','REJEITADA','CANCELADA'],roles:'all'},
  numero:{stages:['APROVADA','PO_GERADA','ATUALIZAR_INFO','FATURADA','VALIDADA','CONCLUIDA'],roles:'all'},
  fatura:{stages:['PO_GERADA','ATUALIZAR_INFO','FATURADA','VALIDADA','CONCLUIDA'],roles:'all'},
  pagamento:{stages:['FATURADA','VALIDADA','CONCLUIDA'],roles:'all'},
  contabil:{stages:['APROVADA','PO_GERADA','ATUALIZAR_INFO','FATURADA','VALIDADA','CONCLUIDA'],roles:['admin','financeiro']}
};
function poFieldVisible(key,po){
  const m=PO_FIELD_MATRIX[key]; if(!m)return true;
  const stageOk=m.stages.includes(po.status);

  return stageOk&&roleOk;
}

function sanitizeRich(html){
  const tmp=document.createElement('div'); tmp.innerHTML=html||'';
  const allowed=new Set(['B','STRONG','UL','LI','BR','DIV']);
  function process(node){
    Array.from(node.childNodes).forEach(process);
    if(node.nodeType===1){
      if(!allowed.has(node.tagName)){
        while(node.firstChild) node.parentNode.insertBefore(node.firstChild, node);
        node.parentNode.removeChild(node);
      } else {
        Array.from(node.attributes).forEach(a=>node.removeAttribute(a.name));
      }
    } else if(node.nodeType!==3){
      node.parentNode && node.parentNode.removeChild(node);
    }
  }
  Array.from(tmp.childNodes).forEach(process);
  return tmp.innerHTML;
}

/* Scans real people (DATA.pessoas — the actual roster with emails) for
   @mentions in a log update. Was scanning the legacy, largely-empty TEAM
   roster before, which is why "@mention" never actually notified anyone —
   TEAM entries rarely carry a usable email.
   Two passes so duplicate first names don't cross-fire: pass 1 matches full
   "@First Last" mentions (typed via the autocomplete, which always inserts
   the full name) and blanks out whatever it claims; pass 2 falls back to
   bare "@First" against whatever's left, so an already-claimed "@Ana Ramos"
   can't also accidentally match a separate "Ana Costa". */
function pmMentionScan(txt){
  const esc2=s=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const people=(DATA.pessoas||[]).filter(pe=>pe.email);
  const out=[], seen=new Set(); let work=txt;
  people.forEach(pe=>{
    const nome=[pe.nome,pe.sobrenome].filter(Boolean).join(' ').trim();
    if(!nome||!nome.includes(' ')||seen.has(pe.email))return;
    const re=new RegExp('@'+esc2(nome)+'\\b','ig');
    if(re.test(work)){ out.push({nome,email:pe.email}); seen.add(pe.email); work=work.replace(re,m=>' '.repeat(m.length)); }
  });
  people.forEach(pe=>{
    if(seen.has(pe.email))return;
    const nome=[pe.nome,pe.sobrenome].filter(Boolean).join(' ').trim();
    if(!nome)return;
    const first=(pe.nome||nome).split(/\s+/)[0];
    const re=new RegExp('@'+esc2(first)+'\\b','i');
    if(re.test(work)){ out.push({nome,email:pe.email}); seen.add(pe.email); }
  });
  return out;
}

function pmToggleOpen(tid){ const t=atv(tid); if(t){ t._open=!t._open; renderProjModal(); } }
async function saveProj(){
  if(!EDIT)return;
  if(!(EDIT.nome||'').trim()){ toast('Give the project a name.'); return; }
  if(!EDIT.ptipo){ toast('Select the project type.'); return; }
  const clean=JSON.parse(JSON.stringify(EDIT)); delete clean._new;
  const fromTask=clean._fromTask; delete clean._fromTask;
  clean.etapa=effectiveEtapa(clean); clean.status=autoStatus(clean);
  try{
    const {error}=await SB.from('projetos').upsert({id:clean.id,data:clean});
    if(error)throw error;
    const i=DATA.projetos.findIndex(p=>p.id===clean.id);
    if(i>=0)DATA.projetos[i]=clean; else DATA.projetos.push(clean);
    if(fromTask){ const l=loadPTasks(); const t=l.find(x=>x.id===fromTask); if(t&&!t.done){ t.done=true; t.updatedAt=Date.now(); savePTasks(l); } }
    toast('Project saved ✓'); closeModal(); go(SCREEN);
  }catch(e){ toast('Error saving: '+(e.message||e)); }
}
async function delProj(id){
  if(!confirm('Delete this project? This action cannot be undone.'))return;
  try{ await SB.from('projetos').delete().eq('id',id); DATA.projetos=DATA.projetos.filter(p=>p.id!==id); toast('Project deleted'); closeModal(); go(SCREEN); }
  catch(e){ toast('Error: '+(e.message||e)); }
}

function myMentions(){
  const me=((currentUser&&currentUser.email)||'').toLowerCase();
  const meTeam=(TEAM||[]).find(m=>(m.email||'').toLowerCase()===me);
  const meName=meTeam?meTeam.nome:'';
  const out=[];
  DATA.projetos.forEach(p=>{(p.logs||[]).forEach(l=>{(l.mencoes||[]).forEach(mn=>{
    const hit=(mn.email&&mn.email.toLowerCase()===me)||(meName&&mn.nome===meName)||isManager;
    if(hit)out.push({proj:p.nome,pid:p.id,txt:l.txt,autor:l.autor,t:l.t});
  });});});
  return out.sort((a,b)=>String(b.t).localeCompare(String(a.t)));
}
async function notifMarkRead(id,val){

async function notifDelete(id){

/* Work-origin notifications (project @mentions) are computed live from
   project logs — there's no DB row to mark read/delete against, unlike
   Budget's "notificacoes" table. Persist read/dismissed state client-side
   per notification, keyed the same way buildNotifList already dedupes
   (proj+txt+t) — mirrors the existing dismissRec() localStorage pattern. */
function wnKey(x){ return x.proj+'|'+x.txt+'|'+x.t; }
function wnState(){ try{ return JSON.parse(localStorage.getItem('wn_state')||'{}')||{}; }catch(e){ return {}; } }
function wnSave(s){ try{ localStorage.setItem('wn_state',JSON.stringify(s)); }catch(e){} }
function notifMarkReadWork(key,val){ const s=wnState(); s[key]=val?'read':'unread'; wnSave(s); go(SCREEN); }
function notifDeleteWork(key){ const s=wnState(); s[key]='dismissed'; wnSave(s); go(SCREEN); }
async function notifMarkAllRead(){
  const wn=wnState();
  buildNotifList().filter(x=>x.origin==='work'&&!x.lida).forEach(x=>{ wn[x.key]='read'; });
  wnSave(wn);
  const ids=DATA.notif.filter(n=>!n.lida).map(n=>n.id);
  if(ids.length){
    try{ await SBPO.from('notificacoes').update({lida:true}).in('id',ids); DATA.notif.forEach(n=>n.lida=true); }
    catch(e){ toast('Error: '+(e.message||e)); return; }
  }
  go(SCREEN); toast('All marked as read ✓');
}
async function notifClearAll(){
  const all=buildNotifList(); if(!all.length)return;
  if(!confirm('Delete all notifications? This cannot be undone.'))return;
  const wn=wnState();
  all.filter(x=>x.origin==='work').forEach(x=>{ wn[x.key]='dismissed'; });
  wnSave(wn);
  const ids=DATA.notif.map(n=>n.id);
  if(ids.length){
    try{ await SBPO.from('notificacoes').delete().in('id',ids); DATA.notif=[]; }
    catch(e){ toast('Error: '+(e.message||e)); return; }
  }
  go(SCREEN); toast('Notifications cleared');
}
function buildNotifList(){
  const wn=wnState();
  const ms=myMentions().map(m=>({...m,origin:'work'}));
  const tbl=(DATA.mencoes||[]).map(m=>({proj:m.projeto_nome,pid:'',txt:m.mensagem,autor:m.autor,t:String(m.criado_em||'').slice(0,10),origin:'work'}));
  const budget=(DATA.notif||[]).map(n=>({proj:'Budget · PO',pid:'',poId:n.po_id||'',projId:n.projeto_id||'',tipo:n.tipo||'',txt:n.mensagem||'PO update requiring your attention',autor:'PO',t:String(n.criada_em||'').slice(0,10),origin:'budget',id:n.id,lida:!!n.lida}));
  const seen=new Set();
  return [...tbl,...ms,...budget].filter(x=>{const k=x.proj+'|'+x.txt+'|'+x.t;if(seen.has(k))return false;seen.add(k);return true;})
    .map(x=>{
      if(x.origin!=='work')return x;
      const key=wnKey(x), st=wn[key];
      if(st==='dismissed')return null;
      return {...x,key,lida:st==='read'};
    }).filter(Boolean)
    .sort((a,b)=>String(b.t).localeCompare(String(a.t)));
}
function notifUnreadCount(){ return buildNotifList().filter(x=>!x.lida).length; }

      const navigate=(m.origin==='budget'&&m.poId)?`notifGoPO('${esc(m.poId)}','${esc(m.tipo)}')`:(m.origin==='budget'&&m.projId)?`notifGoProjeto('${esc(m.projId)}','${esc(m.tipo)}')`:(m.pid?`openProj('${esc(m.pid)}')`:'');
      const readToggle=m.origin==='budget'?`notifMarkRead(${m.id},${!unread})`:`notifMarkReadWork('${esc(m.key)}',${!unread})`;
      const del=m.origin==='budget'?`notifDelete(${m.id})`:`notifDeleteWork('${esc(m.key)}')`;
      // Clicking anywhere on the row marks it read, in addition to whatever
      // navigation the row already supported — separate from the explicit
      // ●/○ toggle button, which still lets you flip it back to unread.
      const markRead=m.origin==='budget'?`notifMarkRead(${m.id},true)`:`notifMarkReadWork('${esc(m.key)}',true)`;
      const rowClick=[unread?markRead:'',navigate].filter(Boolean).join(';');
      return `<div class="row-item" style="${unread?'':'opacity:.62'};${(clickable||unread)?'cursor:pointer':'cursor:default'}" ${rowClick?`onclick="${rowClick}"`:''}>

        <div style="display:flex;gap:4px;flex-shrink:0" onclick="event.stopPropagation()">
          <button title="${unread?'Mark as read':'Mark as unread'}" onclick="${readToggle}" style="border:none;background:none;color:var(--txt-3);cursor:pointer;font-size:13px;padding:4px">${unread?'●':'○'}</button>
          <button title="Delete" onclick="${del}" style="border:none;background:none;color:var(--txt-3);cursor:pointer;font-size:13px;padding:4px">✕</button>
        </div>
      </div>`;
    }).join(''):'<div class="empty">No notifications.</div>'}</div>
    <div style="padding:12px 20px;border-top:1px solid var(--line);font-size:11px;color:var(--txt-3)">One bell for both modules — dots show origin (blue = Work, red = Budget). Mark-read and delete work for both.</div></div>`;
}

/* ============================================================
   ESTÁGIO 3 — PO: solicitar com escolha de mês + realocação admin
   ============================================================ */
let REQ=null; // {mode:'single'|'split', projeto_id, splitAg, meses:[{competencia,teto}], competencia, valor, descricao}
function poNome(id){ const p=DATA.poProjetos.find(x=>x.id===id); return p?p.nome:'—'; }
/* Fee rateio (percentuais fixos por agência) — cada categoria já aponta para
   a campanha real que consome aquele budget (Fee - <agência> TV/AC/LABG…).
   Ao solicitar uma PO de Fee, o valor total é dividido pelos percentuais
   configurados e uma PO é criada em cada campanha correspondente. */
function feeSplitGroups(){
  const byAg={};
  (DATA.fee||[]).forEach(f=>{ if(!f.agencia||!f.categoria)return; (byAg[f.agencia]=byAg[f.agencia]||[]).push(f); });
  const out=[];
  Object.keys(byAg).forEach(ag=>{
    const splits=byAg[ag].map(f=>{
      const proj=DATA.poProjetos.find(p=>p.activity==='FEE'&&p.agencia===ag&&p.product_category===f.categoria&&p.aprovacao_status==='APROVADO');
      return {categoria:f.categoria, percentual:+f.percentual||0, projeto_id:proj?proj.id:null, nome:proj?proj.nome:null};
    });
    if(splits.length && splits.every(s=>s.projeto_id)) out.push({agencia:ag, splits});
  });
  return out;
}
async function mesesDoProjeto(pid){
  const p=DATA.poProjetos.find(x=>x.id===pid);
  if(DEMO_MODE){
    if(p&&p.rateio){
      const byM={}; (DATA.rateio||[]).filter(r=>r.projeto_id===pid).forEach(a=>{const m=String(a.competencia).slice(0,7);byM[m]=(byM[m]||0)+(+a.valor||0);});
      return Object.keys(byM).sort().map(m=>({competencia:m+'-01',teto:byM[m]}));
    }
    return (DATA.tetos||[]).filter(t=>t.projeto_id===pid).map(t=>({competencia:String(t.competencia).slice(0,10),teto:+t.teto})).sort((a,b)=>a.competencia.localeCompare(b.competencia));
  }
  try{
    if(p&&p.rateio){
      const {data}=await SBPO.from('rateio_alocacao').select('competencia,valor').eq('projeto_id',pid);
      const byM={}; (data||[]).forEach(a=>{const m=String(a.competencia).slice(0,7);byM[m]=(byM[m]||0)+(+a.valor||0);});
      return Object.keys(byM).sort().map(m=>({competencia:m+'-01',teto:byM[m]}));
    }else{
      const {data}=await SBPO.from('tetos').select('competencia,teto').eq('projeto_id',pid).order('competencia');
      return (data||[]).map(t=>({competencia:String(t.competencia).slice(0,10),teto:+t.teto}));
    }
  }catch(e){ return []; }
}
function consumoMes(pid,comp){
  return DATA.pos.filter(po=>po.projeto_id===pid&&String(po.competencia).slice(0,7)===String(comp).slice(0,7)&&!['REJEITADA','CANCELADA'].includes(po.status)).reduce((s,po)=>s+(+po.valor||0),0);
}
function projMonths(pid){ return DATA.tetos.filter(t=>t.projeto_id===pid).map(t=>({competencia:String(t.competencia).slice(0,10),teto:+t.teto})).sort((a,b)=>a.competencia.localeCompare(b.competencia)); }
function reqOptions(){
  let projs=DATA.poProjetos.filter(p=>p.aprovacao_status==='APROVADO');
  if(PAPEL==='agencia'&&MINHA_AGENCIA) projs=projs.filter(p=>p.agencia===MINHA_AGENCIA);
  const groups=feeSplitGroups().filter(g=>!(PAPEL==='agencia'&&MINHA_AGENCIA)||g.agencia===MINHA_AGENCIA);
  const splitIds=new Set(groups.flatMap(g=>g.splits.map(s=>s.projeto_id)));
  // the individual TV/AC/LABG fee campaigns are requested through their agency's split group, not directly
  const single=projs.filter(p=>!splitIds.has(p.id));
  return {single,groups};
}
function openReqPO(pid){
  const {single,groups}=reqOptions();
  if(pid){
    const group=groups.find(g=>g.splits.some(s=>s.projeto_id===pid));
    if(group){ REQ={mode:'split',projeto_id:'FEE::'+group.agencia,splitAg:group.agencia,meses:[],competencia:'',valor:'',descricao:''}; reqLoadMesesSplit(); return; }
    if(single.some(p=>p.id===pid)){ REQ={mode:'single',projeto_id:pid,meses:[],competencia:'',valor:'',descricao:''}; renderReqPO(); reqLoadMeses(); return; }
  }
  REQ={mode:'single',projeto_id:single[0]?single[0].id:'',meses:[],competencia:'',valor:'',descricao:''};
  renderReqPO(); if(REQ.projeto_id) reqLoadMeses();
}
async function reqLoadMeses(){
  REQ.meses=await mesesDoProjeto(REQ.projeto_id);
  REQ.competencia=REQ.meses[0]?REQ.meses[0].competencia:'';
  renderReqPO();
}
function reqLoadMesesSplit(){
  const group=feeSplitGroups().find(g=>g.agencia===REQ.splitAg); if(!group)return;
  let comps=null;
  group.splits.forEach(s=>{ const set=new Set(projMonths(s.projeto_id).map(m=>m.competencia)); comps=comps?new Set([...comps].filter(c=>set.has(c))):set; });
  REQ.meses=[...(comps||[])].sort().map(competencia=>({competencia}));
  REQ.competencia=REQ.meses[0]?REQ.meses[0].competencia:'';
  renderReqPO();
}
function reqSet(k,v){
  if(!REQ)return;
  if(k==='projeto_id'){
    if(String(v).startsWith('FEE::')){ REQ.mode='split'; REQ.splitAg=v.slice(5); REQ.projeto_id=v; reqLoadMesesSplit(); }
    else { REQ.mode='single'; REQ.projeto_id=v; reqLoadMeses(); }
    return;
  }
  REQ[k]=v;
  if(k==='competencia'&&REQ.mode==='split'){ renderReqPO(); return; }
  renderReqPO();
}
function reqSplitBreakdown(){
  const group=feeSplitGroups().find(g=>g.agencia===REQ.splitAg); if(!group)return [];
  const total=+REQ.valor||0; const comp=REQ.competencia;
  let running=0;
  return group.splits.map((s,i)=>{
    let valor=Math.round(total*s.percentual);
    if(i===group.splits.length-1) valor=Math.round(total)-running; else running+=valor;
    const teto=comp?(projMonths(s.projeto_id).find(m=>m.competencia===comp)||{}).teto||0:0;
    const cons=comp?consumoMes(s.projeto_id,comp):0;
    const saldo=teto-cons-valor;
    return {...s,valor,teto,cons,saldo};
  });
}
function renderReqPO(){

  const campOpts=`${single.map(p=>`<option value="${p.id}" ${REQ.projeto_id===p.id?'selected':''}>${esc(p.nome)}${p.agencia?' · '+esc(p.agencia):''}</option>`).join('')}${groups.map(g=>`<option value="FEE::${esc(g.agencia)}" ${REQ.projeto_id==='FEE::'+g.agencia?'selected':''}>Fee — ${esc(g.agencia)} (split ${g.splits.map(s=>s.categoria).join('/')})</option>`).join('')}`;

  let body;

    const rows=reqSplitBreakdown();
    const val=+REQ.valor||0;
    const estoura=rows.some(r=>r.saldo<-0.001);
    body=`
      <div class="field"><label>Description</label><input value="${esc(REQ.descricao)}" onchange="reqSet('descricao',this.value)" placeholder="e.g. Agency fee — July"></div>
      ${campField}
      <div class="field"><label>Month to allocate</label><select onchange="reqSet('competencia',this.value)">${REQ.meses.length?REQ.meses.map(m=>`<option value="${m.competencia}" ${REQ.competencia===m.competencia?'selected':''}>${fmtMes(m.competencia)}</option>`).join(''):'<option value="">No common month across TV/AC/LABG</option>'}</select></div>
      <div class="field"><label>Total value (R$)</label><input type="number" min="0" step="100" value="${esc(REQ.valor)}" onchange="reqSet('valor',this.value)" placeholder="0,00"></div>
      <div style="border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:14px">
        <div style="padding:9px 13px;background:#fafbfd;border-bottom:1px solid var(--line);font-size:11px;font-weight:700;color:var(--txt-3);text-transform:uppercase;letter-spacing:.05em">Split by fixed percentage — same fee percentuals, one PO per campaign</div>
        <div style="padding:10px 13px;display:flex;flex-direction:column;gap:8px">
          ${rows.map(r=>`<div style="display:flex;align-items:center;gap:10px;font-size:12.5px">
            <span style="width:52px;font-weight:700;color:var(--txt-2)">${esc(r.categoria)}</span>
            <span style="width:44px;color:var(--txt-3)">${(r.percentual*100).toFixed(1)}%</span>
            <span class="mono" style="flex:1;text-align:right;font-weight:700">${BRL(r.valor)}</span>
            <span class="mono" style="width:130px;text-align:right;font-size:11px;color:${r.saldo<0?'var(--red)':'var(--txt-3)'}">saldo ${BRL(r.saldo)}</span>
          </div>`).join('')}
        </div>
      </div>
      <div style="font-size:11.5px;color:var(--txt-3);background:var(--paper-2);border:1px solid var(--line);border-radius:9px;padding:9px 12px;margin-bottom:14px">${icn('calendar',12)} Estimated payment if requested today: <b style="color:var(--txt-2)">~${fmtDateObjBR(calcVencimento(new Date().toISOString().slice(0,10)))}</b> <span style="color:var(--txt-3)">(final date is confirmed once the invoice is posted)</span></div>
      ${estoura?'<div class="banner" style="background:var(--red-bg);border-color:#f0b8b2;color:#b32418">One or more categories exceed the balance of the selected month.</div>':''}
    `;
  }else{
    const mSel=REQ.meses.find(m=>m.competencia===REQ.competencia);
    const teto=mSel?mSel.teto:0, cons=REQ.competencia?consumoMes(REQ.projeto_id,REQ.competencia):0, saldo=teto-cons;
    const val=+REQ.valor||0, estoura=val>saldo+0.001;
    body=`
      <div class="field"><label>Description</label><input value="${esc(REQ.descricao)}" onchange="reqSet('descricao',this.value)" placeholder="e.g. Video production, paid media…"></div>
      ${campField}
      <div class="field"><label>Month to allocate (as opened in the project)</label>
        <select onchange="reqSet('competencia',this.value)">${REQ.meses.length?REQ.meses.map(m=>`<option value="${m.competencia}" ${REQ.competencia===m.competencia?'selected':''}>${fmtMes(m.competencia)} — cap ${BRL(m.teto)}</option>`).join(''):'<option value="">Project has no months registered</option>'}</select>
        ${REQ.competencia?`<div style="font-size:11.5px;color:${estoura?'var(--red)':'var(--txt-3)'};margin-top:5px">Month balance: <b class="mono">${BRL(saldo)}</b> (cap ${BRL(teto)} − consumed ${BRL(cons)})</div>`:''}</div>
      <div class="field"><label>Value (R$)</label><input type="number" min="0" step="100" value="${esc(REQ.valor)}" onchange="reqSet('valor',this.value)" placeholder="0,00"></div>

    `;
  }
  $('#modalMount').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div role="dialog" aria-modal="true" class="modal" style="max-width:560px">
    <div class="modal-h"><h3>Request PO</h3><button class="x" onclick="closeModal()" aria-label="Close dialog">✕</button></div>
    <div class="modal-b">${body}</div>

async function submitReqPO(){
  if(!REQ)return;
  if(REQ.mode==='split'){
    if(!REQ.splitAg){ toast('Choose the agency.'); return; }
    if(!REQ.competencia){ toast('Choose the allocation month.'); return; }
    const val=+REQ.valor||0; if(val<=0){ toast('Enter a value.'); return; }
    const rows=reqSplitBreakdown();
    if(DEMO_MODE){
      rows.forEach(r=>{ if(r.valor>0) demoAddPO(r.projeto_id,REQ.competencia,REQ.splitAg,r.valor,(REQ.descricao||'')+' — '+r.categoria); });
      toast('PO split across '+rows.length+' categories for '+fmtMes(REQ.competencia)+' ✓ (demo)'); closeModal(); go('pos');
      return;
    }
    if(viewOnly()){toast(roMsg());return;}
    try{
      for(const r of rows){
        if(r.valor<=0)continue;
        const {error}=await SBPO.rpc('solicitar_po',{p_projeto:r.projeto_id,p_competencia:REQ.competencia,p_agencia:REQ.splitAg,p_valor:r.valor,p_descricao:(REQ.descricao||'')+' — '+r.categoria});
        if(error)throw error;
      }
      toast('PO split across '+rows.length+' categories for '+fmtMes(REQ.competencia)+' ✓'); closeModal();
      await reloadPO(); go('pos');
    }catch(e){ toast('Error: '+(e.message||e)); }
    return;
  }
  if(!REQ.projeto_id){ toast('Choose the campaign.'); return; }
  if(!REQ.competencia){ toast('Choose the allocation month.'); return; }
  const val=+REQ.valor||0; if(val<=0){ toast('Enter a value.'); return; }
  const ag=(PAPEL==='agencia'&&MINHA_AGENCIA)?MINHA_AGENCIA:(DATA.poProjetos.find(p=>p.id===REQ.projeto_id)||{}).agencia||'';
  if(DEMO_MODE){

    toast('PO requested for '+fmtMes(REQ.competencia)+' ✓ (demo)'); closeModal(); go('pos');
    return;
  }
  if(viewOnly()){toast(roMsg());return;}
  try{
    const {error}=await SBPO.rpc('solicitar_po',{p_projeto:REQ.projeto_id,p_competencia:REQ.competencia,p_agencia:ag,p_valor:val,p_descricao:REQ.descricao||''});
    if(error)throw error;
    toast('PO requested for '+fmtMes(REQ.competencia)+' ✓'); closeModal();
    await reloadPO(); go('pos');
  }catch(e){ toast('Error: '+(e.message||e)); }
}

/* admin realoca o mês de uma PO */
async function realocarPO(poId){
  if(viewOnly()){toast(roMsg());return;}
  if(!isManager&&PAPEL!=='admin'){ toast('Only admin can reallocate.'); return; }
  const po=DATA.pos.find(p=>p.id===poId); if(!po)return;
  const meses=await mesesDoProjeto(po.projeto_id);
  const opts=meses.map(m=>fmtMes(m.competencia)).join(', ');
  const novo=prompt('Reallocate PO to which month? Project months: '+opts+'\n\nEnter in YYYY-MM format (e.g. 2026-08):', String(po.competencia).slice(0,7));
  if(!novo)return;
  const comp=/^\d{4}-\d{2}$/.test(novo)?novo+'-01':novo;
  try{
    const {error}=await SBPO.from('pos').update({competencia:comp}).eq('id',poId);
    if(error)throw error;
    po.competencia=comp; toast('PO reallocated to '+fmtMes(comp)+' ✓'); go('pos');
  }catch(e){ toast('Error reallocating: '+(e.message||e)); }
}
